<title>Last Mile - RODACOOP</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--y:#ffe600;--bl:#3483fa;--dk:#333;--md:#666;--wh:#fff;--bd:#e6e6e6;--gr:#00a650;--re:#f23d4f;--or:#ff7733;--font:'Nunito Sans',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;color:var(--dk);font-family:var(--font);font-size:14px}
.hdr{background:var(--y);height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.15);position:sticky;top:0;z-index:200}
.hdr-logo{display:flex;align-items:center}
.hdr-center{position:relative;display:flex;align-items:center}
.hdr-right{display:flex;align-items:center;gap:14px}
.ep-sel{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:#333}
.ep-lbl{color:#555;font-weight:400}
.ep-val{font-weight:800}
.ep-arr{background:none;border:none;cursor:pointer;font-size:13px;font-weight:700;color:#333;padding:0 2px;font-family:var(--font)}
.ep-arr:hover{color:var(--bl)}
.ep-clr{background:none;border:none;cursor:pointer;font-size:14px;font-weight:700;color:#555;padding:0 2px}
.ep-clr:hover{color:var(--re)}
.ep-dd{position:absolute;top:42px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid var(--bd);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:500;min-width:160px;padding:8px 0;display:none}
.ep-dd.open{display:block}
.ep-ddi{padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;color:var(--dk)}
.ep-ddi:hover{background:#f0f4ff;color:var(--bl)}
.ep-ddi.sel{color:var(--bl);font-weight:800}
.badge{background:rgba(0,0,0,.1);border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700}
.dot{width:8px;height:8px;border-radius:50%;background:var(--gr);animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#upd{font-size:11px;color:#555}
.pg{padding:20px 24px}
.pg-title{font-size:20px;font-weight:800;margin-bottom:2px}
.pg-sub{font-size:12px;color:var(--md);margin-bottom:16px}
.tabs{display:flex;border-bottom:2px solid var(--bd);margin-bottom:20px;overflow-x:auto}
.tab{padding:10px 18px;font-size:13px;font-weight:700;color:var(--md);background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;white-space:nowrap;font-family:var(--font)}
.tab:hover{color:var(--bl)}
.tab.act{color:var(--bl);border-bottom-color:var(--bl)}
.sum-card{background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:18px 24px;display:flex;align-items:center;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.sum-main{min-width:70px}
.sum-lbl{font-size:12px;color:var(--md);margin-bottom:2px}
.sum-val{font-size:28px;font-weight:800;color:var(--dk);line-height:1}
.sum-div{width:1px;height:48px;background:var(--bd);flex-shrink:0}
.sum-stats{display:flex;flex-direction:column;gap:4px}
.sum-stat{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--md)}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.slbl{flex:1;min-width:120px}
.spct{font-weight:700;color:var(--dk);min-width:42px;text-align:right}
.scnt{color:var(--md);min-width:36px;text-align:right}
.sub-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px 16px}
.tbl-box{background:var(--wh);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.tbl-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
input.fi,select.fi{border:1px solid var(--bd);border-radius:6px;padding:6px 10px;font-family:var(--font);font-size:12px;color:var(--dk);background:var(--wh);outline:none}
input.fi{width:150px}
.clr{background:none;border:1px solid var(--bd);border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--md);cursor:pointer;font-family:var(--font)}
.clr:hover{border-color:var(--bl);color:var(--bl)}
.csv-btn{background:var(--gr);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)}
.csv-btn:hover{background:#008a5c}
#rc2{font-size:11px;color:var(--md);margin-left:auto}
.tw{overflow-x:auto;max-height:460px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{position:sticky;top:0;background:#fafafa;border-bottom:2px solid var(--bd);padding:9px 11px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--md);white-space:nowrap}
tbody tr{border-bottom:1px solid #f0f0f0}
tbody tr:hover{background:#f5f9ff}
tbody td{padding:8px 11px;vertical-align:middle}
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.on{background:#e8f0fe;color:#1a6fdb}.at{background:#e6f9ef;color:#00a650}.ot{background:#f0f0f0;color:#666}
.ag-ok{color:var(--gr);font-weight:700}.ag-mid{color:var(--or);font-weight:700}.ag-bad{color:var(--re);font-weight:700}
.jw{display:flex;align-items:center;gap:6px}
.ji{border:1px solid var(--bd);border-radius:6px;padding:4px 8px;font-family:var(--font);font-size:11px;width:220px;outline:none;color:var(--dk)}
.ji.sv{border-color:var(--gr);background:#f0fff6}
.jsb{background:var(--bl);color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)}
.jok{font-size:10px;color:var(--gr);font-weight:700}
#ld2{text-align:center;padding:60px;color:var(--md)}
</style>
</head>

<script>
var EPS=["EPA2", "EPA5", "EPA6", "EMN1"];
var SC={"return": "#3483fa", "problem_solving": "#ff7733", "waiting_return": "#9c6fde", "destruction": "#c45a5a", "claimed": "#333333", "sorting": "#00a650", "stale": "#f23d4f", "ready_to_deliver": "#00bcd4", "in_container": "#8b6914", "blocked": "#607d8b", "N/A": "#aaaaaa"};
var DURL="https://franmoraes01.github.io/utr-otr-dashboard/data.json";
var SLUG="rodacoop";
var ALL=[],atab=EPS[0],aep=null;
var EXSUB=["delivered","delivered_place","return","waiting_return","destruction","Delivered","Delivered_place","lost","Lost","DELIVERED","DELIVERED_PLACE","LOST"];
function gj(p){return localStorage.getItem("just_"+p)||"";}
function sj(p,v){localStorage.setItem("just_"+p,v);}

// EP dropdown
var dd=document.getElementById("ep-dd");
document.getElementById("ep-arr").onclick=function(e){
  e.stopPropagation();
  dd.innerHTML='<div class="ep-ddi'+(aep===null?" sel":"")+'" data-ep="">Todos</div>'+
    EPS.map(function(ep){return '<div class="ep-ddi'+(aep===ep?" sel":"")+'" data-ep="'+ep+'">'+ep+'</div>';}).join("");
  dd.querySelectorAll(".ep-ddi").forEach(function(el){
    el.onclick=function(){setEP(this.dataset.ep||null);dd.classList.remove("open");};
  });
  dd.classList.toggle("open");
};
document.getElementById("ep-clr").onclick=function(e){e.stopPropagation();setEP(null);};
document.addEventListener("click",function(){dd.classList.remove("open");});
dd.addEventListener("click",function(e){e.stopPropagation();});

function setEP(ep){
  aep=ep||null;
  document.getElementById("ep-val").textContent=aep||"Todos";
  document.getElementById("ep-clr").style.display=aep?"inline":"none";
  document.getElementById("pg-sub").textContent=aep?"Dashboard Secundario - RODACOOP - "+aep:"Dashboard Secundario - Last Mile por Exchange Point";
  if(aep&&EPS.indexOf(aep)!==-1)atab=aep;
  rebuild();
}

function veps(){return aep?[aep]:EPS;}

function rebuild(){
  var ve=veps();
  if(ve.indexOf(atab)===-1)atab=ve[0];
  var h="";
  ve.forEach(function(ep){h+='<button class="tab'+(atab===ep?" act":"")+'" data-ep="'+ep+'">'+ep+"</button>";});
  document.getElementById("tabs").innerHTML=h;
  document.querySelectorAll(".tab").forEach(function(b){b.onclick=function(){atab=this.dataset.ep;rebuild();};});
  buildSum();popFilt();render();
}

function tabR(){
  return ALL.filter(function(r){return r.EXCHANGE_POINT===atab&&EXSUB.indexOf(r.Sub_Status||"")===-1;});
}

function pct(n,t){return t?(n/t*100).toFixed(1)+"%":"0.0%";}

function buildSum(){
  var recs=tabR(),tot=recs.length;
  var on=recs.filter(function(r){return(r.Status||"").toLowerCase()==="on_route";}).length;
  var at=recs.filter(function(r){return(r.Status||"").toLowerCase()==="at_station";}).length;
  var ot=tot-on-at;
  var wj=recs.filter(function(r){return(r.Status||"").toLowerCase()==="at_station"&&gj(r.PEDIDO);}).length;
  var nj=at-wj;
  var sc={};
  recs.forEach(function(r){var s=r.Sub_Status||"N/A";sc[s]=(sc[s]||0)+1;});
  var sa=Object.keys(sc).map(function(k){return{k:k,v:sc[k]};}).sort(function(a,b){return b.v-a.v;});
  var sg='<div class="sub-grid">'+sa.map(function(s){
    var c=SC[s.k]||"#aaa";
    return'<div class="sum-stat"><span class="sdot" style="background:'+c+'"></span><span class="slbl" style="min-width:110px">'+s.k+'</span><span class="spct">'+pct(s.v,tot)+'</span><span class="scnt">('+s.v+')</span></div>';
  }).join("")+"</div>";
  document.getElementById("sum-card").innerHTML=
    '<div class="sum-main"><div class="sum-lbl">Total</div><div class="sum-val">'+tot+'</div></div>'+
    '<div class="sum-div"></div>'+
    '<div class="sum-stats">'+
      '<div class="sum-stat"><span class="sdot" style="background:#3483fa"></span><span class="slbl">On Route</span><span class="spct">'+pct(on,tot)+'</span><span class="scnt">('+on+')</span></div>'+
      '<div class="sum-stat"><span class="sdot" style="background:#00a650"></span><span class="slbl">At Station</span><span class="spct">'+pct(at,tot)+'</span><span class="scnt">('+at+')</span></div>'+
      (ot?'<div class="sum-stat"><span class="sdot" style="background:#aaa"></span><span class="slbl">Outros</span><span class="spct">'+pct(ot,tot)+'</span><span class="scnt">('+ot+')</span></div>':"")+
    '</div>'+
    '<div class="sum-div"></div>'+
    '<div class="sum-stats">'+
      '<div class="sum-stat"><span class="sdot" style="background:#ff7733"></span><span class="slbl">At Station c/ Just.</span><span class="spct">'+pct(wj,tot)+'</span><span class="scnt">('+wj+')</span></div>'+
      '<div class="sum-stat"><span class="sdot" style="background:#f23d4f"></span><span class="slbl">At Station s/ Just.</span><span class="spct">'+pct(nj,tot)+'</span><span class="scnt">('+nj+')</span></div>'+
    '</div>'+
    (sa.length?'<div class="sum-div"></div>'+sg:"");
}

function mmy(dt){
  if(!dt)return null;
  var d=dt.toString().trim();
  if(d.indexOf("/")!==-1){var p=d.split("/");if(p.length>=3)return p[1]+"/"+p[2].substring(0,4);}
  else if(d.indexOf("-")!==-1){var p2=d.split("-");if(p2.length>=2)return p2[1]+"/"+p2[0];}
  return null;
}

function popFilt(){
  var recs=tabR();
  var st=[...new Set(recs.map(function(r){return r.Status;}).filter(Boolean))].sort();
  var sb=[...new Set(recs.map(function(r){return r.Sub_Status;}).filter(Boolean))].sort();
  var mo={};recs.forEach(function(r){var m=mmy(r.DATA);if(m)mo[m]=true;});
  var ms=Object.keys(mo).sort(function(a,b){var pa=a.split("/"),pb=b.split("/");return(parseInt(pa[1])*12+parseInt(pa[0]))-(parseInt(pb[1])*12+parseInt(pb[0]));});
  var MN=["","Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  document.getElementById("fs2").innerHTML="<option value=''>Todos status</option>"+st.map(function(s){return"<option>"+s+"</option>";}).join("");
  document.getElementById("fb2").innerHTML="<option value=''>Todos sub-status</option>"+sb.map(function(s){return"<option>"+s+"</option>";}).join("");
  document.getElementById("fm2").innerHTML="<option value=''>Todos os meses</option>"+ms.map(function(m){var p=m.split("/");return"<option value='"+m+"'>"+MN[parseInt(p[0])]+"/"+p[1]+"</option>";}).join("");
}

function filt(){
  var recs=tabR();
  var q=document.getElementById("sq2").value.toLowerCase();
  var fs=document.getElementById("fs2").value,fb=document.getElementById("fb2").value;
  var fm=document.getElementById("fm2").value,fj=document.getElementById("fj2").value;
  return recs.filter(function(r){
    if(fs&&r.Status!==fs)return false;
    if(fb&&r.Sub_Status!==fb)return false;
    if(fm){var m=mmy(r.DATA);if(m!==fm)return false;}
    if(fj==="com"&&!gj(r.PEDIDO))return false;
    if(fj==="sem"&&gj(r.PEDIDO))return false;
    if(q&&String(r.PEDIDO||"").toLowerCase().indexOf(q)===-1)return false;
    return true;
  });
}

function chip(s){
  if(!s)return'<span class="chip ot">--</span>';
  var k=s.toLowerCase();
  if(k==="on_route")return'<span class="chip on">'+s+'</span>';
  if(k==="at_station")return'<span class="chip at">'+s+'</span>';
  return'<span class="chip ot">'+s+'</span>';
}
function agC(d){if(d==null)return"";if(d>=3)return"ag-bad";if(d>=1)return"ag-mid";return"ag-ok";}

function render(){
  var rows=filt();
  document.getElementById('rc2').textContent=rows.length+' registros';
  var tb=document.getElementById('tb2');
  if(!rows.length){tb.innerHTML='<tr><td colspan=9 style=text-align:center;padding:24px;color:#aaa>Nenhum registro</td></tr>';return;}
  var h='';
  rows.forEach(function(r){
    var j=gj(r.PEDIDO);
    var esc=j.replace(/&/g,'&amp;').replace(/'/g,'&#39;');
    var pid=String(r.PEDIDO||'');
    var ag=agC(r.Aging_Dias);
    h+='<tr>';
    h+='<td style=font-weight:700;color:var(--bl)>'+(r.PEDIDO||'--')+'</td>';
    h+='<td style=color:#888;font-size:11px>'+(r.DATA||'--')+'</td>';
    h+='<td>'+(r.TRANSPORTADORA||'--')+'</td>';
    h+='<td><strong>'+(r.EXCHANGE_POINT||'--')+'</strong></td>';
    h+='<td>'+chip(r.Status)+'</td>';
    h+='<td style=color:#666>'+(r.Sub_Status||'--')+'</td>';
    h+='<td style=color:#888;font-size:11px>'+(r.Data_Ultima_Movimentacao||'--')+'</td>';
    h+='<td class='+ag+' style=text-align:center>'+(r.Aging_Dias!=null?r.Aging_Dias+'d':'--')+'</td>';
    h+='<td><div class=jw>';
    h+='<input class=ji'+(j?' sv':'')+' id=ji-'+pid+' type=text placeholder=Justificativa... value='+esc+' />';
    h+='<button class=jsb data-pid='+pid+'>Salvar</button>';
    if(j){h+='<span class=jok>OK</span>';}
    h+='</div></td></tr>';
  });
  tb.innerHTML=h;
  document.querySelectorAll('.jsb').forEach(function(b){
    b.onclick=function(){
      var pid=this.dataset.pid;
      var inp=document.getElementById('ji-'+pid);
      if(inp){sj(pid,inp.value.trim());render();buildSum();}
    };
  });
}
function dlCSV(){
  var NL=String.fromCharCode(10);
  var rows=filt();
  var cols=['PEDIDO','DATA','TRANSPORTADORA','EXCHANGE_POINT','Status','Sub_Status','Data_Ultima_Movimentacao','Aging_Dias','Justificativa'];
  var lines=rows.map(function(r){
    return cols.map(function(c){
      var v=(c==='Justificativa')?gj(r.PEDIDO):(r[c]!=null?String(r[c]):'');
      return v;
    }).join(';');
  });
  var csv=cols.join(';')+NL+lines.join(NL);
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='just_'+SLUG+'_'+(aep||'todos')+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function loadD(cb){
  fetch(DURL+"?t="+Date.now()).then(function(r){return r.json();}).then(cb).catch(function(){document.getElementById("ld2").textContent="Falha ao carregar data.json";});
}
function applyD(d){
  ALL=d.records||[];
  document.getElementById("upd").textContent=d.last_update||"";
  document.getElementById("ld2").style.display="none";
  document.getElementById("ct2").style.display="block";
  rebuild();
}
function load(){loadD(applyD);}
