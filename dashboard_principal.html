<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard Principal · Last Mile SPA1</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--y:#ffe600;--bl:#3483fa;--dk:#333;--md:#666;--lt:#f5f5f5;--wh:#fff;--bd:#e6e6e6;--gr:#00a650;--re:#f23d4f;--or:#ff7733;--font:'Nunito Sans',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;color:var(--dk);font-family:var(--font);font-size:14px;min-height:100vh}
.hdr{background:var(--y);height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.15);position:sticky;top:0;z-index:200}
.hdr-logo{display:flex;align-items:center}




.hdr-right{display:flex;align-items:center;gap:14px}
.badge{background:rgba(0,0,0,.1);border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700}
.dot{width:8px;height:8px;border-radius:50%;background:var(--gr);animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#upd{font-size:11px;color:#555}
.pg{padding:20px 24px}
.pg-title{font-size:20px;font-weight:800;margin-bottom:2px}
.pg-sub{font-size:12px;color:var(--md);margin-bottom:20px}
/* SUMMARY CARD */
.summary-wrap{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.sum-card{background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:18px 24px;display:flex;align-items:center;gap:20px;flex:1;flex-wrap:wrap}
.sum-main{min-width:80px}
.sum-label{font-size:12px;color:var(--md);margin-bottom:2px}
.sum-value{font-size:28px;font-weight:800;color:var(--dk);line-height:1}
.sum-divider{width:1px;height:48px;background:var(--bd);flex-shrink:0}
.sum-stats{display:flex;flex-direction:column;gap:4px}
.sum-stats-sub{display:grid;grid-template-columns:repeat(2,1fr);gap:4px 24px}
.sum-stat{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--md)}
.sum-stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sum-stat-label{flex:1}
.sum-stat-pct{font-weight:700;color:var(--dk);min-width:36px;text-align:right}
.sum-stat-count{color:var(--md);min-width:40px;text-align:right}
/* EXCHANGE CARDS */
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--md);margin-bottom:10px}
.ex-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
.ex-card{background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:16px 20px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:20px;min-width:280px;flex:1;position:relative}
.ex-card:hover{border-color:var(--bl);box-shadow:0 4px 16px rgba(52,131,250,.15);transform:translateY(-2px)}
.ex-card.act{border-color:var(--bl);background:#f0f6ff}
.ex-rank{position:absolute;top:8px;right:12px;font-size:10px;font-weight:700;color:#bbb}
.ex-main{min-width:70px}
.ex-name{font-size:13px;font-weight:800;color:var(--dk);margin-bottom:2px}
.ex-total-lbl{font-size:10px;color:var(--md);text-transform:uppercase;letter-spacing:.05em}
.ex-total{font-size:26px;font-weight:800;color:var(--dk);line-height:1.1}
.ex-vdiv{width:1px;height:44px;background:var(--bd);flex-shrink:0}
.ex-stats{display:flex;gap:16px}
.ex-stat{text-align:center}
.ex-stat-v{font-size:15px;font-weight:700}
.ex-stat-l{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--md)}
.c-on{color:var(--bl)}.c-at{color:var(--gr)}.c-ju{color:var(--or)}.c-nj{color:var(--re)}
/* TABLE */
.tbl-box{background:var(--wh);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.tbl-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.tbl-bar-title{font-size:14px;font-weight:700;margin-right:4px}
input.fi,select.fi{border:1px solid var(--bd);border-radius:6px;padding:6px 10px;font-family:var(--font);font-size:12px;color:var(--dk);background:var(--wh);outline:none;transition:border .18s}
input.fi:focus,select.fi:focus{border-color:var(--bl)}
input.fi{width:160px}
select.fi-month{width:130px}
.clr{background:none;border:1px solid var(--bd);border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--md);cursor:pointer;transition:all .18s;font-family:var(--font)}
.clr:hover{border-color:var(--bl);color:var(--bl)}
.csv-btn{background:var(--gr);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:5px;transition:background .18s}
.csv-btn:hover{background:#008a5c}
#rc{font-size:11px;color:var(--md);white-space:nowrap;margin-left:auto}
.tw{overflow-x:auto;max-height:500px;overflow-y:auto}
.tw::-webkit-scrollbar{width:4px;height:4px}
.tw::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{position:sticky;top:0;background:#fafafa;border-bottom:2px solid var(--bd);padding:9px 11px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--md);cursor:pointer;white-space:nowrap}
thead th:hover{color:var(--bl)}
tbody tr{border-bottom:1px solid #f0f0f0;transition:background .1s}
tbody tr:hover{background:#f5f9ff}
tbody td{padding:8px 11px;vertical-align:middle}
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.on{background:#e8f0fe;color:#1a6fdb}.at{background:#e6f9ef;color:#00a650}.ot{background:#f0f0f0;color:#666}
.ag-ok{color:var(--gr);font-weight:700}.ag-mid{color:var(--or);font-weight:700}.ag-bad{color:var(--re);font-weight:700}
.jc{font-size:11px;color:var(--bl);font-style:italic;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.je{font-size:11px;color:#ccc}
#ld{text-align:center;padding:60px;color:var(--md)}
</style>
</head>

<div class="pg">
  <div class="pg-title">Monitoramento Last Mile</div>
  <div class="pg-sub">Dashboard Principal · Liberação de Pacotes</div>
  <div id="ld">⟳ Carregando dados...</div>
  <div id="ct" style="display:none">
    <div class="summary-wrap" id="summary-wrap"></div>
    <div class="sec-lbl">Exchange Points — clique para filtrar</div>
    <div class="ex-grid" id="ex-grid"></div>
    <div class="tbl-box">
      <div class="tbl-bar">
        <span class="tbl-bar-title">Pedidos</span>
        <input class="fi" id="sq" type="text" placeholder="Buscar pedido, descrição…"/>
        <select class="fi" id="fs"><option value="">Todos os status</option></select>
        <select class="fi" id="fb"><option value="">Todos sub-status</option></select>
        <select class="fi fi-month" id="fm"><option value="">Todos os meses</option></select>
        <select class="fi" id="fex"><option value="">Todos Exchange Pts</option></select>
        <button class="clr" id="clr">✕ Limpar</button>
        <button class="csv-btn" id="csv-btn">⬇ Baixar CSV</button>
        <span id="rc"></span>
      </div>
      <div class="tw">
        <table>
          <thead><tr>
            <th data-c="PEDIDO">Pedido</th>
            <th data-c="DATA">Data</th>
            <th data-c="TRANSPORTADORA">Transportadora</th>
            <th data-c="DESCRICAO">Descrição</th>
            <th data-c="VALOR_USD">USD</th>
            <th data-c="VALOR_REAL">BRL</th>
            <th data-c="EXCHANGE_POINT">Exchange Pt</th>
            <th data-c="Status">Status</th>
            <th data-c="Sub_Status">Sub-Status</th>
            <th data-c="Data_Ultima_Movimentacao">Última Mov.</th>
            <th data-c="Aging_Dias">Aging (dias)</th>
            <th data-c="Justificativa">Justificativa</th>
          </tr></thead>
          <tbody id="tb"></tbody>
        </table>
      </div>

<script>
var brl = function(v){ return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0); };
var usd = function(v){ return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(v||0); };
var gj  = function(p){ return localStorage.getItem('just_'+p)||''; };

// Sub-status excluídos do filtro padrão
var EXCLUDED_SUB = ['delivered','delivered_place','return','waiting_return','destruction','Delivered','Delivered_place','lost','Lost','DELIVERED','DELIVERED_PLACE','LOST'];

function chip(s){
  if(!s) return '<span class="chip ot">—</span>';
  var k=s.toLowerCase();
  if(k==='on_route') return '<span class="chip on">'+s+'</span>';
  if(k==='at_station') return '<span class="chip at">'+s+'</span>';
  return '<span class="chip ot">'+s+'</span>';
}
function agClass(d){ if(d==null) return ''; if(d>=3) return 'ag-bad'; if(d>=1) return 'ag-mid'; return 'ag-ok'; }

var ALL=[], sc=null, sd=1, aex=null;

// Extrai mês/ano de uma string de data (DD/MM/YYYY ou YYYY-MM-DD)
function extractMonthYear(dt){
  if(!dt) return null;
  var d = dt.toString().trim();
  if(d.indexOf('/')!==-1){
    var p=d.split('/');
    if(p.length>=3) return p[1]+'/'+p[2].substring(0,4); // MM/YYYY
  } else if(d.indexOf('-')!==-1){
    var p2=d.split('-');
    if(p2.length>=2) return p2[1]+'/'+p2[0]; // MM/YYYY
  }
  return null;
}

function buildSummary(){
  // Aplica filtro de sub-status excluídos para o summary
  var base = ALL.filter(function(r){ return EXCLUDED_SUB.indexOf(r.Sub_Status||'')===-1; });
  var total=base.length;
  var on=base.filter(function(r){ return (r.Status||'').toLowerCase()==='on_route'; }).length;
  var at=base.filter(function(r){ return (r.Status||'').toLowerCase()==='at_station'; }).length;
  var other=total-on-at;
  var wj=base.filter(function(r){ return (r.Status||'').toLowerCase()==='at_station'&&gj(r.PEDIDO); }).length;
  var nj=at-wj;
  var pct=function(n){ return total?(n/total*100).toFixed(1)+'%':'0%'; };
  var subMap={};
  base.forEach(function(r){ var s=r.Sub_Status||'N/A'; subMap[s]=(subMap[s]||0)+1; });
  var subSorted=Object.entries(subMap).sort(function(a,b){return b[1]-a[1];});
  var subColors=['#3483fa','#00a650','#ff7733','#f23d4f','#a66af8','#0891b2','#be185d','#854d0e','#555'];
  var subHTML=subSorted.map(function(item,i){
    return '<div class="sum-stat"><span class="sum-stat-dot" style="background:'+subColors[i%subColors.length]+'"></span><span class="sum-stat-label">'+item[0]+'</span><span class="sum-stat-pct">'+pct(item[1])+'</span><span class="sum-stat-count">('+item[1]+')</span></div>';
  }).join('');
  document.getElementById('summary-wrap').innerHTML=
    '<div class="sum-card">'+
    '<div class="sum-main"><div class="sum-label">Pedidos</div><div class="sum-value">'+total+'</div></div>'+
    '<div class="sum-divider"></div>'+
    '<div class="sum-stats">'+
      '<div class="sum-stat"><span class="sum-stat-dot" style="background:#3483fa"></span><span class="sum-stat-label">On Route</span><span class="sum-stat-pct">'+pct(on)+'</span><span class="sum-stat-count">('+on+')</span></div>'+
      '<div class="sum-stat"><span class="sum-stat-dot" style="background:#00a650"></span><span class="sum-stat-label">At Station</span><span class="sum-stat-pct">'+pct(at)+'</span><span class="sum-stat-count">('+at+')</span></div>'+
      '<div class="sum-stat"><span class="sum-stat-dot" style="background:#999"></span><span class="sum-stat-label">Outros</span><span class="sum-stat-pct">'+pct(other)+'</span><span class="sum-stat-count">('+other+')</span></div>'+
    '</div>'+
    '<div class="sum-divider"></div>'+
    '<div class="sum-stats">'+
      '<div class="sum-stat"><span class="sum-stat-dot" style="background:#ff7733"></span><span class="sum-stat-label">At Station c/ Just.</span><span class="sum-stat-pct">'+pct(wj)+'</span><span class="sum-stat-count">('+wj+')</span></div>'+
      '<div class="sum-stat"><span class="sum-stat-dot" style="background:#f23d4f"></span><span class="sum-stat-label">At Station s/ Just.</span><span class="sum-stat-pct">'+pct(nj)+'</span><span class="sum-stat-count">('+nj+')</span></div>'+
    '</div>'+
    '<div class="sum-divider"></div>'+
    '<div class="sum-stats sum-stats-sub">'+subHTML+'</div>'+
    '</div>';
}

function buildCards(){
  var base=ALL.filter(function(r){ return EXCLUDED_SUB.indexOf(r.Sub_Status||'')===-1; });
  var map={};
  base.forEach(function(r){
    var ex=r.EXCHANGE_POINT||'N/A';
    if(!map[ex]) map[ex]={t:0,on:0,at:0,jt:0,nj:0};
    map[ex].t++;
    var st=(r.Status||'').toLowerCase();
    if(st==='on_route') map[ex].on++;
    if(st==='at_station'){ map[ex].at++; if(gj(r.PEDIDO)) map[ex].jt++; else map[ex].nj++; }
  });
  var sorted=Object.entries(map).sort(function(a,b){return b[1].t-a[1].t;});
  var html='';
  sorted.forEach(function(item,i){
    var ex=item[0],d=item[1];
    var act=aex===ex?' act':'';
    html+='<div class="ex-card'+act+'" data-ex="'+ex+'">';
    html+='<span class="ex-rank">#'+(i+1)+'</span>';
    html+='<div class="ex-main"><div class="ex-name">'+ex+'</div><div class="ex-total-lbl">Pedidos</div><div class="ex-total">'+d.t+'</div></div>';
    html+='<div class="ex-vdiv"></div>';
    html+='<div class="ex-stats">';
    html+='<div class="ex-stat"><div class="ex-stat-v c-on">'+d.on+'</div><div class="ex-stat-l">On Route</div></div>';
    html+='<div class="ex-stat"><div class="ex-stat-v c-at">'+d.at+'</div><div class="ex-stat-l">At Station</div></div>';
    html+='<div class="ex-stat"><div class="ex-stat-v c-ju">'+d.jt+'</div><div class="ex-stat-l">c/ Just.</div></div>';
    html+='<div class="ex-stat"><div class="ex-stat-v c-nj">'+d.nj+'</div><div class="ex-stat-l">s/ Just.</div></div>';
    html+='</div></div>';
  });
  document.getElementById('ex-grid').innerHTML=html;
  document.querySelectorAll('.ex-card').forEach(function(card){
    card.addEventListener('click',function(){ fex(this.dataset.ex); });
  });
}

function fex(ex){ aex=(aex===ex)?null:ex; buildCards(); render(); }

function filt(){
  var q=document.getElementById('sq').value.toLowerCase();
  var fs=document.getElementById('fs').value;
  var fb=document.getElementById('fb').value;
  var fm=document.getElementById('fm').value;
  var fex_v=document.getElementById('fex').value;
  return ALL.filter(function(r){
    // Filtro padrão: exclui delivered e lost
    if(EXCLUDED_SUB.indexOf(r.Sub_Status||'')!==-1) return false;
    if(aex && r.EXCHANGE_POINT!==aex) return false;
    if(fex_v && r.EXCHANGE_POINT!==fex_v) return false;
    if(fs && r.Status!==fs) return false;
    if(fb && r.Sub_Status!==fb) return false;
    if(fm){
      var my=extractMonthYear(r.DATA);
      if(my!==fm) return false;
    }
    if(q){
      var h=((r.PEDIDO||'')+' '+(r.DESCRICAO||'')+' '+(r.TRANSPORTADORA||'')).toLowerCase();
      if(h.indexOf(q)===-1) return false;
    }
    return true;
  });
}

function render(){
  var rows=filt();
  if(sc) rows.sort(function(a,b){ var av=a[sc]||'',bv=b[sc]||''; var an=parseFloat(av),bn=parseFloat(bv); return(!isNaN(an)&&!isNaN(bn))?sd*(an-bn):sd*String(av).localeCompare(String(bv)); });
  document.getElementById('rc').textContent=rows.length+' registros';
  var tb=document.getElementById('tb');
  if(!rows.length){ tb.innerHTML='<tr><td colspan="12" style="text-align:center;padding:24px;color:#aaa">Nenhum registro</td></tr>'; return; }
  var html='';
  rows.forEach(function(r){
    var j=gj(r.PEDIDO);
    html+='<tr>';
    html+='<td style="font-weight:700;color:var(--bl)">'+(r.PEDIDO||'—')+'</td>';
    html+='<td style="color:#888;font-size:11px">'+(r.DATA||'—')+'</td>';
    html+='<td>'+(r.TRANSPORTADORA||'—')+'</td>';
    html+='<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+(r.DESCRICAO||'')+'">'+(r.DESCRICAO||'—')+'</td>';
    html+='<td>'+(r.VALOR_USD!=null?usd(r.VALOR_USD):'—')+'</td>';
    html+='<td>'+(r.VALOR_REAL!=null?brl(r.VALOR_REAL):'—')+'</td>';
    html+='<td><strong>'+(r.EXCHANGE_POINT||'—')+'</strong></td>';
    html+='<td>'+chip(r.Status)+'</td>';
    html+='<td style="color:#666">'+(r.Sub_Status||'—')+'</td>';
    html+='<td style="color:#888;font-size:11px">'+(r.Data_Ultima_Movimentacao||'—')+'</td>';
    html+='<td class="'+agClass(r.Aging_Dias)+'" style="text-align:center">'+(r.Aging_Dias!=null?r.Aging_Dias+'d':'—')+'</td>';
    html+='<td>'+(j?'<span class="jc" title="'+j+'">'+j+'</span>':'<span class="je">—</span>')+'</td>';
    html+='</tr>';
  });
  tb.innerHTML=html;
}

function popFilters(){
  var base=ALL.filter(function(r){ return EXCLUDED_SUB.indexOf(r.Sub_Status||'')===-1; });
  var st=[...new Set(base.map(function(r){return r.Status;}).filter(Boolean))].sort();
  var sb=[...new Set(base.map(function(r){return r.Sub_Status;}).filter(Boolean))].sort();
  var exs=[...new Set(base.map(function(r){return r.EXCHANGE_POINT;}).filter(Boolean))].sort();
  // Meses disponíveis
  var months={};
  base.forEach(function(r){ var my=extractMonthYear(r.DATA); if(my) months[my]=true; });
  var monthsSorted=Object.keys(months).sort(function(a,b){
    var pa=a.split('/'),pb=b.split('/');
    return (parseInt(pa[1])*12+parseInt(pa[0]))-(parseInt(pb[1])*12+parseInt(pb[0]));
  });
  var MESES=['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('fs').innerHTML='<option value="">Todos os status</option>'+st.map(function(s){return '<option>'+s+'</option>';}).join('');
  document.getElementById('fb').innerHTML='<option value="">Todos sub-status</option>'+sb.map(function(s){return '<option>'+s+'</option>';}).join('');
  document.getElementById('fex').innerHTML='<option value="">Todos Exchange Pts</option>'+exs.map(function(e){return '<option>'+e+'</option>';}).join('');
  document.getElementById('fm').innerHTML='<option value="">Todos os meses</option>'+monthsSorted.map(function(my){
    var p=my.split('/'); return '<option value="'+my+'">'+MESES[parseInt(p[0])]+'/'+p[1]+'</option>';
  }).join('');
}

function downloadCSV(){
  var rows=filt();
  var cols=['PEDIDO','DATA','TRANSPORTADORA','DESCRICAO','VALOR_USD','VALOR_REAL','EXCHANGE_POINT','Status','Sub_Status','Data_Ultima_Movimentacao','Aging_Dias','Justificativa'];
  var header=cols.join(';');
  var lines=rows.map(function(r){
    return cols.map(function(c){
      var v = c==='Justificativa' ? gj(r.PEDIDO) : (r[c]!=null?r[c]:'');
      return '"'+String(v).replace(/"/g,'""')+'"';
    }).join(';');
  });
  var csv='\uFEFF'+header+'\n'+lines.join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='lastmile_spa1_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); URL.revokeObjectURL(url);
}

document.querySelectorAll('thead th[data-c]').forEach(function(th){
  th.addEventListener('click',function(){ var c=this.dataset.c; if(sc===c){sd*=-1;}else{sc=c;sd=1;} render(); });
});
['sq','fs','fb','fm','fex'].forEach(function(id){ var el=document.getElementById(id); el.addEventListener('input',render); el.addEventListener('change',render); });
document.getElementById('clr').addEventListener('click',function(){
  document.getElementById('sq').value='';
  ['fs','fb','fm','fex'].forEach(function(id){document.getElementById(id).value='';});
  aex=null; buildCards(); render();
});
document.getElementById('csv-btn').addEventListener('click',downloadCSV);

function loadData(callback){
  // Tenta fetch (HTTP), cai para XHR (file://)
  if(window.location.protocol==='file:'){
    var xhr=new XMLHttpRequest();
    xhr.open('GET','data.json?t='+Date.now(),true);
    xhr.onload=function(){ if(xhr.status===200||xhr.status===0){ try{callback(JSON.parse(xhr.responseText));}catch(e){showErr();} } else showErr(); };
    xhr.onerror=showErr; xhr.send();
  } else {
    fetch('data.json?t='+Date.now())
      .then(function(r){return r.json();})
      .then(callback)
      .catch(showErr);
  }
}
function showErr(){ document.getElementById('ld').textContent='⚠ Falha ao carregar data.json'; }
function applyData(d){
  ALL=d.records||[];
  document.getElementById('upd').textContent='⟳ '+d.last_update;
  document.getElementById('ld').style.display='none';
  document.getElementById('ct').style.display='block';
  popFilters(); buildSummary(); buildCards(); render();
}
function load(){ loadData(applyData); }
load();
setInterval(load,60000);
setInterval(function(){ if(ALL.length){ buildSummary(); buildCards(); render(); } },10000);
</script>
