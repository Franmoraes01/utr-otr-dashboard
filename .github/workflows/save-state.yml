name: Salvar State do Dashboard

on:
  repository_dispatch:
    types: [save-state]

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Salvar state.json
        run: |
          echo '${{ toJson(github.event.client_payload.state) }}' > state.json

      - name: Commit e push
        run: |
          git config user.name  "NONECO Dashboard"
          git config user.email "dashboard@noreply"
          git add state.json
          git diff --staged --quiet || git commit -m "state: atualiza dados — $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M')"
          git push
