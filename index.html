<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aduana Audits · Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:#f4f3f0;--surface:#fff;--surface-1:#f9f8f6;
  --border:rgba(11,11,11,.09);--border-strong:rgba(11,11,11,.18);
  --text-primary:#0b0b0b;--text-secondary:#52514e;--text-muted:#898781;
  --accent:#2a78d6;
  --success-bg:#e8f8e8;--success-text:#0a6e0a;
  --warning-bg:#fff8e1;--warning-text:#a06e00;
  --danger-bg:#fdecea;--danger-text:#9a2222;
  --neutral-bg:#f1f0ed;--neutral-text:#52514e;
  --radius:10px;--font:system-ui,-apple-system,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#141413;--surface:#1e1e1c;--surface-1:#252523;
    --border:rgba(255,255,255,.09);--border-strong:rgba(255,255,255,.18);
    --text-primary:#f0efea;--text-secondary:#c3c2b7;--text-muted:#6e6d68;
    --success-bg:#0a2e0a;--success-text:#6dda6d;
    --warning-bg:#2e2000;--warning-text:#f0b93a;
    --danger-bg:#2e0a0a;--danger-text:#e87070;
    --neutral-bg:#252523;--neutral-text:#c3c2b7;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);min-height:100vh;font-size:14px;}

/* HEADER */
header{background:var(--surface);border-bottom:.5px solid var(--border-strong);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;flex-shrink:0;}
.logo-name{font-size:15px;font-weight:500;}
.logo-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}
.header-right{display:flex;align-items:center;gap:9px;}
.pill{display:flex;align-items:center;gap:6px;background:var(--surface-1);border:.5px solid var(--border);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--text-muted);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);flex-shrink:0;transition:background .3s;}
.dot.ok{background:#0ca30c;}
.dot.loading{background:#fab219;animation:blink 1s infinite;}
.dot.error{background:#d03b3b;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.btn-refresh{background:none;border:.5px solid var(--border-strong);border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px;color:var(--text-secondary);font-family:var(--font);}
.btn-refresh:hover{background:var(--surface-1);}
.btn-refresh:active{transform:scale(.97);}

/* MAIN */
main{padding:22px 24px;max-width:1280px;margin:0 auto;}

/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:20px;}
.kpi{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:15px 16px;}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:7px;}
.kpi-value{font-size:24px;font-weight:500;line-height:1;}
.kpi-value.md{font-size:17px;margin-top:2px;}
.kpi-note{font-size:10px;color:var(--text-muted);margin-top:5px;}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px;margin-bottom:20px;}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
.card-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:14px;}

/* TABLE */
.tbl-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.tbl-toolbar{padding:11px 18px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.tbl-title{font-size:13px;font-weight:500;}
.tbl-count{font-size:11px;color:var(--text-muted);margin-left:5px;}
.toolbar-controls{display:flex;gap:8px;flex-wrap:wrap;}
.ctrl{background:var(--surface-1);border:.5px solid var(--border-strong);border-radius:7px;padding:6px 10px;font-size:12px;color:var(--text-primary);font-family:var(--font);cursor:pointer;}
.ctrl:focus{outline:none;border-color:var(--accent);}
.scroll-x{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--surface-1);padding:9px 14px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);border-bottom:.5px solid var(--border-strong);white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--text-secondary);}
thead th.asc::after{content:" ▲";font-size:9px;color:var(--accent);}
thead th.desc::after{content:" ▼";font-size:9px;color:var(--accent);}
tbody td{padding:9px 14px;border-top:.5px solid var(--border);color:var(--text-secondary);font-size:13px;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;}
tbody tr:hover td{background:var(--surface-1);}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;}
.b-ok{background:var(--success-bg);color:var(--success-text);}
.b-warn{background:var(--warning-bg);color:var(--warning-text);}
.b-err{background:var(--danger-bg);color:var(--danger-text);}
.b-neu{background:var(--neutral-bg);color:var(--neutral-text);}
.pag{padding:10px 18px;border-top:.5px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);}
.pag-btn{background:none;border:.5px solid var(--border-strong);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;color:var(--text-secondary);font-family:var(--font);}
.pag-btn:hover:not(:disabled){background:var(--surface-1);}
.pag-btn:disabled{opacity:.35;cursor:default;}
.state-box{padding:44px;text-align:center;color:var(--text-muted);}
.state-icon{font-size:28px;margin-bottom:10px;}
.state-msg{font-size:14px;color:var(--text-secondary);margin-bottom:5px;}
.state-sub{font-size:12px;}

@media(max-width:600px){header{padding:10px 14px;}main{padding:14px;}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">A</div>
    <div>
      <div class="logo-name">Aduana Audits</div>
      <div class="logo-sub" id="logoSub">Iniciando...</div>
    </div>
  </div>
  <div class="header-right">
    <div class="pill">
      <span class="dot loading" id="dot"></span>
      <span id="statusTxt">Carregando</span>
    </div>
    <button class="btn-refresh" id="refreshBtn" onclick="load(true)">↻ <span id="cd">60s</span></button>
  </div>
</header>

<main>
  <div class="kpi-row" id="kpiRow"></div>
  <div class="charts-row" id="chartsRow" style="display:none"></div>
  <div class="tbl-card">
    <div class="tbl-toolbar">
      <div><span class="tbl-title">Registros</span><span class="tbl-count" id="tblCount"></span></div>
      <div class="toolbar-controls">
        <select class="ctrl" id="catFilter" onchange="filter()" style="display:none"></select>
        <input class="ctrl" type="search" id="search" placeholder="Buscar..." oninput="filter()" style="width:180px">
      </div>
    </div>
    <div class="scroll-x" id="tableWrap">
      <div class="state-box"><div class="state-icon">⏳</div><div class="state-msg">Buscando dados...</div></div>
    </div>
    <div class="pag" id="pag" style="display:none">
      <button class="pag-btn" id="prevBtn" onclick="page(-1)">← Anterior</button>
      <span id="pageInfo"></span>
      <span style="flex:1"></span>
      <button class="pag-btn" id="nextBtn" onclick="page(1)">Próximo →</button>
    </div>
  </div>
</main>

<script>
/* ── CONFIG ── */
/* O CSV fica no mesmo repositório que este index.html.
   O GitHub Pages serve ambos do mesmo domínio → sem CORS.             */
const CSV_PATH = 'Aduana_audits.csv';   /* caminho relativo no repo    */
const REFRESH  = 60;                    /* segundos entre atualizações  */
const PAGE_SZ  = 25;

/* colunas excluídas dos gráficos e KPIs (exato, case-insensitive) */
const HIDDEN_CHARTS = ['motorista','veiculo_placa','transportadora','rota_id'];

/* ── STATE ── */
let rows=[], hdrs=[], filtered=[];
let sortCol=-1, sortAsc=true, curPage=0;
let charts=[], cdVal=REFRESH, cdTimer=null;

/* ── FETCH (mesmo domínio, sem CORS) ── */
async function fetchCSV(){
  const r = await fetch(CSV_PATH, {cache:'no-cache'});
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.text();
}

/* ── PARSE ── */
function parseCSV(txt){
  const lines = txt.trim().split(/\r?\n/);
  if(lines.length<2) throw new Error('CSV vazio');
  const sep = lines[0].split(';').length > lines[0].split(',').length ? ';' : ',';
  const row = l => {
    const res=[]; let cur='',q=false;
    for(let i=0;i<=l.length;i++){
      const c=l[i];
      if(i===l.length){res.push(cur.trim());break;}
      if(c==='"'){q=!q;}
      else if(c===sep&&!q){res.push(cur.trim());cur='';}
      else cur+=c;
    }
    return res;
  };
  return {hdrs:row(lines[0]), rows:lines.slice(1).filter(l=>l.trim()).map(row)};
}

/* ── COL TYPE ── */
function colType(i){
  const v=rows.map(r=>r[i]||'').filter(Boolean);
  if(!v.length) return 'str';
  if(v.filter(x=>!isNaN(x.replace(',','.'))).length/v.length>.75) return 'num';
  if(v.filter(x=>/\d{2,4}[-\/]\d{1,2}[-\/]\d{1,4}|\d{2}:\d{2}/.test(x)).length/v.length>.5) return 'date';
  return 'str';
}

/* ── LOAD ── */
async function load(manual=false){
  if(manual){stopCD();cdVal=REFRESH;}
  setStatus('loading','Atualizando...');
  try{
    const txt = await fetchCSV();
    const p = parseCSV(txt);
    hdrs=p.hdrs; rows=p.rows;
    filter();
    buildKPIs();
    buildCharts();
    buildFilter();
    setStatus('ok', `${rows.length} registros · ${hdrs.length} colunas`);
    document.getElementById('logoSub').textContent=
      `${rows.length} registros · ${new Date().toLocaleTimeString('pt-BR')}`;
    startCD();
  }catch(e){
    setStatus('error','Erro ao carregar');
    document.getElementById('tableWrap').innerHTML=`
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        <div class="state-msg">Não foi possível carregar o CSV</div>
        <div class="state-sub">${esc(e.message)}</div>
      </div>`;
    startCD();
  }
}

/* ── STATUS ── */
function setStatus(s,msg){
  document.getElementById('dot').className='dot '+s;
  document.getElementById('statusTxt').textContent=msg;
}

/* ── COUNTDOWN ── */
function stopCD(){ clearInterval(cdTimer); }
function startCD(){
  stopCD();
  cdVal=REFRESH;
  upCD();
  cdTimer=setInterval(()=>{
    cdVal--;
    upCD();
    if(cdVal<=0){stopCD();load();}
  },1000);
}
function upCD(){ document.getElementById('cd').textContent=cdVal+'s'; }

/* ── KPIs ── */
function buildKPIs(){
  const cats=hdrs.filter((_,i)=>colType(i)==='str');
  const nums=hdrs.filter((_,i)=>colType(i)==='num');
  let html='';

  html+=`<div class="kpi">
    <div class="kpi-label">Total registros</div>
    <div class="kpi-value">${rows.length.toLocaleString('pt-BR')}</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Colunas</div>
    <div class="kpi-value">${hdrs.length}</div>
  </div>`;

  const visibleCats=cats.filter(h=>!HIDDEN_CHARTS.includes(h.toLowerCase()));
  if(visibleCats.length){
    const ci=hdrs.indexOf(visibleCats[0]);
    const u=new Set(rows.map(r=>r[ci])).size;
    html+=`<div class="kpi">
      <div class="kpi-label">${esc(visibleCats[0])} únicos</div>
      <div class="kpi-value">${u}</div>
    </div>`;
  }
  if(nums.length){
    const ci=hdrs.indexOf(nums[0]);
    const vals=rows.map(r=>parseFloat((r[ci]||'0').replace(',','.'))).filter(v=>!isNaN(v));
    const total=vals.reduce((a,b)=>a+b,0);
    html+=`<div class="kpi">
      <div class="kpi-label">${esc(nums[0])} total</div>
      <div class="kpi-value md">${total.toLocaleString('pt-BR',{maximumFractionDigits:1})}</div>
    </div>`;
  }
  html+=`<div class="kpi">
    <div class="kpi-label">Última atualização</div>
    <div class="kpi-value md">${new Date().toLocaleTimeString('pt-BR')}</div>
    <div class="kpi-note">auto-refresh ${REFRESH}s</div>
  </div>`;
  document.getElementById('kpiRow').innerHTML=html;
}

/* ── CHARTS ── */
const PALETTE=['#2a78d6','#1baf7a','#eda100','#4a3aa7','#e34948','#eb6834','#e87ba4','#008300'];
function buildCharts(){
  charts.forEach(c=>c.destroy()); charts=[];
  const wrap=document.getElementById('chartsRow');
  wrap.innerHTML='';
  const dark=matchMedia('(prefers-color-scheme:dark)').matches;
  const grid=dark?'#2c2c2a':'#e8e7e0', tick=dark?'#6e6d68':'#898781';
  let added=0;

  hdrs.forEach((h,i)=>{
    if(colType(i)!=='str') return;
    if(HIDDEN_CHARTS.includes(h.toLowerCase())) return;
    const freq={};
    rows.forEach(r=>{ const v=(r[i]||'').trim()||'(vazio)'; freq[v]=(freq[v]||0)+1; });
    const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,12);
    if(sorted.length<2) return;
    if(added>=3) return;
    const horiz=sorted.length>6;
    const ht=horiz?Math.max(180,sorted.length*28):200;
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`<div class="card-title">${esc(h)}</div>
      <div style="position:relative;height:${ht}px">
        <canvas id="ch${i}" role="img" aria-label="Gráfico de ${esc(h)}"></canvas>
      </div>`;
    wrap.appendChild(div);
    const c=new Chart(document.getElementById('ch'+i),{
      type:'bar',
      data:{
        labels:sorted.map(s=>s[0]),
        datasets:[{
          data:sorted.map(s=>s[1]),
          backgroundColor:sorted.map((_,j)=>PALETTE[j%PALETTE.length]+'bb'),
          borderRadius:4,borderSkipped:false
        }]
      },
      options:{
        indexAxis:horiz?'y':'x',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed[horiz?'x':'y']} reg.`}}},
        scales:{x:{ticks:{color:tick,font:{size:10}},grid:{color:grid}},
                y:{ticks:{color:tick,font:{size:10}},grid:{color:grid}}}
      }
    });
    charts.push(c); added++;
  });

  /* histograma numérico */
  const ni=hdrs.findIndex((h,i)=>colType(i)==='num'&&!HIDDEN_CHARTS.includes(h.toLowerCase()));
  if(ni>=0){
    const vals=rows.map(r=>parseFloat((r[ni]||'0').replace(',','.'))).filter(v=>!isNaN(v)&&isFinite(v));
    if(vals.length>3){
      const mn=Math.min(...vals),mx=Math.max(...vals),B=8,st=(mx-mn)/B||1;
      const cnt=Array(B).fill(0);
      vals.forEach(v=>{ const b=Math.min(Math.floor((v-mn)/st),B-1); cnt[b]++; });
      const div=document.createElement('div');
      div.className='card';
      div.innerHTML=`<div class="card-title">Distribuição · ${esc(hdrs[ni])}</div>
        <div style="position:relative;height:200px">
          <canvas id="chist" role="img" aria-label="Histograma de ${esc(hdrs[ni])}"></canvas>
        </div>`;
      wrap.appendChild(div);
      const c=new Chart(document.getElementById('chist'),{
        type:'bar',
        data:{
          labels:cnt.map((_,i)=>(mn+i*st).toFixed(1)),
          datasets:[{data:cnt,backgroundColor:dark?'#199e70bb':'#1baf7abb',borderRadius:3}]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false}},
          scales:{x:{ticks:{color:tick,font:{size:10}},grid:{color:grid}},
                  y:{ticks:{color:tick,font:{size:10}},grid:{color:grid}}}
        }
      });
      charts.push(c); added++;
    }
  }
  wrap.style.display=added?'grid':'none';
}

/* ── CATEGORY FILTER ── */
function buildFilter(){
  const ci=hdrs.findIndex((h,i)=>colType(i)==='str'&&!HIDDEN_CHARTS.includes(h.toLowerCase())&&new Set(rows.map(r=>r[i])).size<40);
  const sel=document.getElementById('catFilter');
  if(ci<0){sel.style.display='none';return;}
  sel.dataset.ci=ci;
  const vals=['',... new Set(rows.map(r=>r[ci]).filter(Boolean))].sort();
  sel.innerHTML=`<option value="">Todos (${esc(hdrs[ci])})</option>`
    +vals.filter(Boolean).map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');
  sel.style.display='';
}

/* ── FILTER + RENDER ── */
function filter(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const sel=document.getElementById('catFilter');
  const fv=sel.value, fci=parseInt(sel.dataset.ci||'-1');
  filtered=rows.filter(r=>{
    if(fv&&fci>=0&&(r[fci]||'').trim()!==fv) return false;
    if(q&&!r.some(c=>(c||'').toLowerCase().includes(q))) return false;
    return true;
  });
  curPage=0;
  renderTable();
}

function renderTable(){
  document.getElementById('tblCount').textContent=
    filtered.length!==rows.length?`${filtered.length} de ${rows.length}`:`${filtered.length}`;
  if(!hdrs.length) return;
  if(!filtered.length){
    document.getElementById('tableWrap').innerHTML=
      `<div class="state-box"><div class="state-icon">🔍</div>
       <div class="state-msg">Nenhum resultado</div>
       <div class="state-sub">Tente outro filtro</div></div>`;
    document.getElementById('pag').style.display='none';
    return;
  }
  const start=curPage*PAGE_SZ;
  const pg=filtered.slice(start,start+PAGE_SZ);
  const tp=Math.ceil(filtered.length/PAGE_SZ);

  const th=hdrs.map((h,i)=>{
    const cls=sortCol===i?(sortAsc?'asc':'desc'):'';
    return `<th class="${cls}" onclick="sort(${i})">${esc(h)}</th>`;
  }).join('');

  const tb=pg.map(r=>'<tr>'+hdrs.map((_,i)=>`<td title="${esc(r[i]||'')}">${cell(hdrs[i],r[i]||'')}</td>`).join('')+'</tr>').join('');

  document.getElementById('tableWrap').innerHTML=
    `<table><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table>`;

  document.getElementById('pageInfo').textContent=`Página ${curPage+1} de ${tp}`;
  document.getElementById('prevBtn').disabled=curPage===0;
  document.getElementById('nextBtn').disabled=curPage>=tp-1;
  document.getElementById('pag').style.display=tp>1?'flex':'none';
}

/* ── SORT ── */
function sort(i){
  sortAsc=(sortCol===i)?!sortAsc:true; sortCol=i;
  const num=colType(i)==='num';
  filtered.sort((a,b)=>{
    const av=a[i]||'',bv=b[i]||'';
    const d=num?(parseFloat(av.replace(',','.'))||0)-(parseFloat(bv.replace(',','.'))||0)
               :av.localeCompare(bv,'pt-BR',{numeric:true});
    return sortAsc?d:-d;
  });
  curPage=0; renderTable();
}
function page(d){
  curPage=Math.max(0,Math.min(Math.ceil(filtered.length/PAGE_SZ)-1,curPage+d));
  renderTable();
}

/* ── BADGE ── */
const OK=['ok','aprovado','success','ativo','concluido','done','pass','normal','regular','aberto'];
const ERR=['erro','error','falha','fail','reprovado','negado','rejeit','irregular','bloqueado'];
const WRN=['pendente','warn','aguard','andamento','parcial','analise','revisao'];
const STATUS_KEYS=['status','estado','result','situac','condicao','classif'];
function cell(col,val){
  if(!val) return '<span style="color:var(--text-muted)">—</span>';
  const cl=col.toLowerCase(), vl=val.toLowerCase();
  if(STATUS_KEYS.some(k=>cl.includes(k))){
    if(OK.some(k=>vl.includes(k)))  return `<span class="badge b-ok">${esc(val)}</span>`;
    if(ERR.some(k=>vl.includes(k))) return `<span class="badge b-err">${esc(val)}</span>`;
    if(WRN.some(k=>vl.includes(k))) return `<span class="badge b-warn">${esc(val)}</span>`;
    return `<span class="badge b-neu">${esc(val)}</span>`;
  }
  return esc(val);
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

load();
</script>
</body>
</html>
