<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Principal — Monitoramento Logístico</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --verde:   #acdb26;
      --azul:    #293358;
      --fundo:   #f0f3e4;
      --amarelo: #FFE600;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--fundo); color: var(--azul); }

    /* HEADER */
    .header-bar { background: var(--amarelo); padding: 0 24px; height: 64px; display: flex; align-items: center; gap: 0; }
    .header-bar img.logo { height: 40px; width: auto; display: block; }
    .header-bar .divider { width: 1px; height: 32px; background: rgba(41,51,88,.3); margin: 0 18px; }
    .header-bar h1 { font-size: 1rem; font-weight: 700; color: var(--azul); letter-spacing: .3px; white-space: nowrap; }
    .badge { background: var(--azul); color: white; font-size: .7rem; font-weight: 700; padding: 3px 8px; border-radius: 20px; }

    /* NAV */
    .nav-bar { background: #1e2845; display: flex; align-items: center; padding: 0 24px; }
    .nav-bar a { display: inline-block; padding: 10px 20px; color: #8090b8; text-decoration: none; font-size: .88rem; font-weight: 600; border-bottom: 3px solid transparent; transition: all .15s; }
    .nav-bar a:hover { color: #cdd4f0; }
    .nav-bar a.active { color: var(--amarelo); border-bottom-color: var(--amarelo); }

    /* TOOLBAR */
    .toolbar { background: var(--azul); padding: 12px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .toolbar label { color: #cdd4f0; font-size: .85rem; }
    .toolbar select { border: none; border-radius: 6px; padding: 6px 10px; font-size: .9rem; background: white; color: var(--azul); outline: none; }
    .toolbar button { background: var(--verde); color: var(--azul); border: none; border-radius: 6px; padding: 7px 16px; font-weight: 700; cursor: pointer; font-size: .9rem; transition: opacity .15s; }
    .toolbar button:hover { opacity: .85; }
    .last-update { margin-left: auto; color: #8090b8; font-size: .78rem; }

    /* MAIN */
    main { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }

    /* STATUS MSG */
    #statusMsg { text-align: center; padding: 40px; color: #8090b8; font-size: .95rem; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid #cdd; border-top-color: var(--azul); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* OVERVIEW CARDS */
    .cards-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
    .overview-card { background: white; border-radius: 14px; box-shadow: 0 3px 14px rgba(0,0,0,.09); overflow: hidden; }
    .card-header { padding: 14px 18px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f0f0f0; }
    .card-badge { font-size: .78rem; font-weight: 800; padding: 4px 12px; border-radius: 6px; color: white; letter-spacing: .5px; white-space: nowrap; }
    .card-title { font-size: .8rem; font-weight: 600; color: #293358; }
    .card-body { padding: 16px 18px 14px; display: flex; flex-direction: column; gap: 12px; }
    .card-metric { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .card-metric .mlabel { font-size: .7rem; text-transform: uppercase; color: #8090b8; font-weight: 700; letter-spacing: .4px; }
    .card-metric .mvalue { font-size: 1.6rem; font-weight: 700; line-height: 1; }
    .prog-wrap { margin-top: 4px; }
    .prog-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 3px; background: var(--verde); transition: width .4s; }
    .prog-label { font-size: .7rem; color: #8090b8; margin-top: 4px; text-align: right; font-weight: 600; }

    /* IMPORT BAR GLOBAL */
    .import-bar {
      background: white; border-radius: 10px; padding: 12px 20px;
      box-shadow: 0 3px 10px rgba(0,0,0,.07);
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .import-bar span.lbl { font-weight: 700; color: var(--azul); font-size: .9rem; }
    .import-bar span.hint { font-size: .75rem; color: #8090b8; margin-left: 4px; }
    .btn-import-global {
      background: var(--verde); color: var(--azul); border: none;
      border-radius: 6px; padding: 7px 16px; font-weight: 700; cursor: pointer; font-size: .85rem;
    }
    .btn-import-global:hover { opacity: .85; }
    .btn-clear-all {
      background: #fde8e8; border: 1px solid #f5a0a0; color: #b71c1c;
      border-radius: 6px; padding: 6px 14px; font-size: .85rem; font-weight: 600; cursor: pointer;
    }
    .btn-clear-all:hover { background: #fad0d0; }

    /* TABLE SECTION */
    .tbl-section { background: white; border-radius: 12px; box-shadow: 0 3px 12px rgba(0,0,0,.08); overflow: hidden; }
    .tbl-header {
      display: flex; align-items: center; gap: 12px; padding: 14px 18px;
      border-left: 5px solid var(--accent, #293358);
      flex-wrap: wrap;
    }
    .tbl-header .type-badge {
      font-size: .8rem; font-weight: 800; padding: 4px 10px; border-radius: 6px;
      background: var(--accent, #293358); color: white; letter-spacing: .5px;
    }
    .tbl-header h3 { font-size: .95rem; font-weight: 700; color: var(--azul); }
    .tbl-header .totals { margin-left: auto; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .tot-item { text-align: center; }
    .tot-item .tl { font-size: .65rem; text-transform: uppercase; color: #8090b8; }
    .tot-item .tv { font-size: 1.1rem; font-weight: 700; }
    .tv.plan  { color: var(--azul); }
    .tv.exped { color: #27ae60; }
    .tv.pend  { color: #c0392b; }

    .tbl-actions { padding: 8px 18px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
    .tbl-actions label { font-size: .8rem; color: #6b7a9a; }
    .btn-import { background: #f0f3e4; border: 1px solid #c8d4a0; border-radius: 6px; padding: 5px 12px; font-size: .8rem; color: var(--azul); cursor: pointer; font-weight: 600; transition: background .12s; }
    .btn-import:hover { background: #e0e9c4; }
    .btn-clear-plan { background: #fde8e8; border: 1px solid #f5a0a0; border-radius: 6px; padding: 5px 12px; font-size: .8rem; color: #b71c1c; cursor: pointer; font-weight: 600; }
    .btn-clear-plan:hover { background: #fad0d0; }

    /* TABLE */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; min-width: 860px; }
    thead th {
      background: var(--azul); color: white; padding: 10px 12px;
      text-align: center; white-space: nowrap; font-size: .75rem;
      text-transform: uppercase; letter-spacing: .3px;
    }
    thead th:first-child, thead th:nth-child(2) { text-align: left; }
    tbody tr:nth-child(even) { background: #f8f9f4; }
    tbody tr:hover { background: #eef3d6; }
    tbody td { padding: 7px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; text-align: center; }
    tbody td:first-child, tbody td:nth-child(2) { text-align: left; font-weight: 600; }
    tfoot td { padding: 8px 10px; font-weight: 700; background: #f0f3e4; border-top: 2px solid #c8d4a0; font-size: .82rem; text-align: center; }
    tfoot td:first-child, tfoot td:nth-child(2) { text-align: left; }

    /* BADGE ID ORIGEM */
    .id-badge { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: .72rem; font-weight: 800; color: white; background: var(--accent, #293358); }

    /* INPUTS */
    input.plan-input {
      width: 80px; text-align: center; border: 1px solid #dde; border-radius: 6px;
      padding: 5px 6px; font-size: .85rem; font-family: inherit; color: var(--azul);
      background: white; transition: border-color .12s;
    }
    input.plan-input:focus { outline: none; border-color: var(--verde); }

    select.status-sel {
      border: 1px solid #dde; border-radius: 6px; padding: 5px 6px;
      font-size: .75rem; font-family: inherit; cursor: pointer; width: 160px;
      font-weight: 600; transition: background .12s;
    }
    select.status-sel:focus { outline: none; }

    input.obs-input {
      border: 1px solid #dde; border-radius: 6px; padding: 5px 8px;
      font-size: .8rem; font-family: inherit; width: 100%; min-width: 140px;
      background: white; transition: border-color .12s;
    }
    input.obs-input:focus { outline: none; border-color: var(--verde); }

    /* PENDENTES COLOR */
    .pend-pos { color: #c0392b; font-weight: 700; }
    .pend-zero { color: #27ae60; font-weight: 700; }
    .pend-neg { color: #1565a0; font-weight: 700; }
    .pend-na { color: #aaa; }
  </style>
</head>

<script>
// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const GITHUB_OWNER  = 'Franmoraes01';
const GITHUB_REPO   = 'utr-otr-dashboard';
const GITHUB_BRANCH = 'main';
const BASE_CSV      = 'Logistics_api';
const LS_KEY       = 'meli_dashboard_v3';
// ↓ Cole aqui a URL do seu Firebase Realtime Database (sem barra no final)
// https://utr-otr-dashboard-default-rtdb.firebaseio.com
const FIREBASE_URL  = 'https://utr-otr-dashboard-default-rtdb.firebaseio.com';
const FIREBASE_PATH = '/dashboard-spa1.json';

const STATUS_OPTS = [
  '', 'ANTECIPAÇÃO', 'EM EXPEDIÇÃO', 'A CAMINHO XPT', 'A CAMINHO NEX',
  'RISCO NOSHOW', 'NO SHOW', 'SEM RISCO NOSHOW', 'SUPRIU ROTA',
  'REOFERTA', 'DOBRA ALINHADA', 'DRIVER A CAMINHO', 'SEM ATIVIDADE', 'ERRO OPERACIONAL'
];

const STATUS_STYLE = {
  '':                  { bg: '#f5f5f5', fg: '#888' },
  'ANTECIPAÇÃO':       { bg: '#d6eeff', fg: '#1565a0' },
  'EM EXPEDIÇÃO':      { bg: '#e8f8c0', fg: '#3d6b00' },
  'A CAMINHO XPT':     { bg: '#e8d6ff', fg: '#5c1a8f' },
  'A CAMINHO NEX':     { bg: '#d5f5e9', fg: '#0e6b44' },
  'RISCO NOSHOW':      { bg: '#fff0d6', fg: '#a06000' },
  'NO SHOW':           { bg: '#fde8e8', fg: '#b71c1c' },
  'SEM RISCO NOSHOW':  { bg: '#e8f8c0', fg: '#3d6b00' },
  'SUPRIU ROTA':       { bg: '#d5f5e9', fg: '#0e6b44' },
  'REOFERTA':          { bg: '#fff0d6', fg: '#a06000' },
  'DOBRA ALINHADA':    { bg: '#d6eeff', fg: '#1565a0' },
  'DRIVER A CAMINHO':  { bg: '#ede8ff', fg: '#4a148c' },
  'SEM ATIVIDADE':     { bg: '#eeeeee', fg: '#555' },
  'ERRO OPERACIONAL':  { bg: '#fde8e8', fg: '#b71c1c' },
};

// Definições das 4 tabelas
const TABLES_DEF = [
  {
    key: 'SVC', label: 'SVC', accent: '#293358',
    subtitle: 'Service Center',
    origins: ['JL Castro','RodaCoop','COOPMETRO','PANTERA LOG TRAN','50 Mais','BRJTransportes','Kangu Logistics','WLS CARGO','Envios Extra'],
    countFn(rows, origin, C, today) {
      return rows.filter(r =>
        cv(r, C.carrier) === origin &&
        !nullish(cv(r, C.cluster)) &&
        cv(r, C.status).toLowerCase() !== 'planned' &&
        cv(r, C.facilityId) === 'SPA1'
      ).length;
    }
  },
  {
    key: 'XPT', label: 'XPT', accent: '#6c3483',
    subtitle: 'Exchange Points',
    origins: ['EPA1','EPA2','EPA3','EPA4','EPA5','EPA6','EPA7','EPA8','EPA9','ETO4'],
    countFn(rows, origin, C, today) {
      return rows.filter(r =>
        cv(r, C.facilityId) === origin &&
        !nullish(cv(r, C.cluster)) &&
        cv(r, C.status).toLowerCase() !== 'planned' &&
        cv(r, C.facilityType).toLowerCase() === 'exchange_point'
      ).length;
    }
  },
  {
    key: 'NEX', label: 'NEX', accent: '#d35400',
    subtitle: 'NEX',
    origins: ['BRNPA26','BRNPA75','BRNPA193','BRNPA736','BRNPA11444','BRNPA11440','BRDPA11404','BRNPA769','BRNPA527','BRNPA240','BRNPA535','BRNPA11416','BRNPA11420','BRNPA11425','BRNPA11441'],
    countFn(rows, origin, C, today) {
      return rows.filter(r =>
        cv(r, C.facilityId) === origin &&
        !nullish(cv(r, C.cluster)) &&
        matchesToday(cv(r, C.initDate)) &&
        cv(r, C.status).toLowerCase() !== 'planned' &&
        cv(r, C.facilityType).toLowerCase() === 'nex'
      ).length;
    }
  },
  {
    key: 'DC', label: 'DC', accent: '#922b21',
    subtitle: 'Delivery Cells',
    origins: ['BRDPA11445','BRDPA11446','BRDPA11447','BRDPA11448','BRDPA11449','BRDPA193','BRDPA26','BRDPA11452'],
    countFn(rows, origin, C, today) {
      return rows.filter(r =>
        cv(r, C.facilityId) === origin &&
        !nullish(cv(r, C.cluster)) &&
        matchesToday(cv(r, C.initDate)) &&
        cv(r, C.status).toLowerCase() !== 'planned' &&
        cv(r, C.facilityType).toLowerCase() === 'delivery_cell'
      ).length;
    }
  }
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let allRows = [];
let COLS    = {};
let refreshTimer = null;
let pushTimer   = null;   // debounce antes de salvar no Firebase
let _fromRemote = false;  // impede loop: saveLS vindo do Firebase não re-dispara push
let evtSource   = null;   // SSE connection ao Firebase

// localStorage: { SVC: { 'JL Castro': {p:0,s:'',o:''}, ... }, XPT:{...}, ... }
function loadLS() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
  catch { return {}; }
}
function saveLS(state) {
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  if (!_fromRemote) schedulePush();
}
function getRow(state, key, origin) {
  if (!state[key]) state[key] = {};
  if (!state[key][origin]) state[key][origin] = { p: 0, s: '', o: '' };
  return state[key][origin];
}

// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════
function cv(row, col) { return col ? String(row[col] ?? '').trim() : ''; }
function nullish(v) {
  const s = String(v ?? '').trim().toLowerCase();
  return s === '' || s === 'null' || s === 'nan' || s === 'undefined' || s === 'none';
}
function dateStr(v) { return (v || '').substring(0, 10); }
function today() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}
// Converte qualquer formato de data para Date object
function toDate(val) {
  const s = String(val || '').trim();
  if (!s || nullish(s)) return null;
  const num = Number(s);
  if (!isNaN(num) && /^\d+$/.test(s)) {
    // Unix timestamp: 10 dígitos = segundos → *1000; 13 dígitos = ms
    return new Date(num > 1e12 ? num : num * 1000);
  }
  return new Date(s); // ISO, etc.
}

// Formata para DD/MM/AAAA (fuso local do navegador)
function formatarDataBrasileira(val) {
  const d = toDate(val);
  if (!d || isNaN(d.getTime())) return String(val || '—');
  const dd   = String(d.getDate()).padStart(2,'0');
  const mm   = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  return `${dd}/${mm}/${yyyy}`;
}

// Retorna true se val representa o dia de hoje (horário local)
function matchesToday(val) {
  const d = toDate(val);
  if (!d || isNaN(d.getTime())) return false;
  const now = new Date();
  return d.getFullYear() === now.getFullYear() &&
         d.getMonth()    === now.getMonth()    &&
         d.getDate()     === now.getDate();
}

function detectCols(columns) {
  const lc = columns.map(c => c.toLowerCase());
  // correspondência EXATA (case-insensitive) — evita que 'carrierId' seja confundido com 'carrier'
  const exact = name => columns.find(c => c.toLowerCase() === name.toLowerCase()) || '';
  // correspondência por fragmento (fallback)
  const f = (...frags) => {
    const idx = lc.findIndex(c => frags.every(g => c.includes(g.toLowerCase())));
    return idx >= 0 ? columns[idx] : '';
  };
  return {
    carrier:      exact('carrier')      || exact('carrierName') || f('carriername') || f('carrier.name') || f('carrier_name'),
    status:       exact('status')       || f('status'),
    facilityId:   exact('facilityId')   || exact('facilityid')   || f('facilityid')   || f('facility.id')   || f('facility_id'),
    facilityType: exact('facilityType') || exact('facilitytype') || f('facilitytype') || f('facility.type') || f('facility_type'),
    cluster:      exact('cluster')      || f('cluster'),
    initDate:     exact('initDate')     || exact('initdate')     || f('initdate')     || f('init.date')     || f('init_date'),
  };
}

// ═══════════════════════════════════════════════════════════
// SYNC FIREBASE — tempo real entre todos os usuários
// ═══════════════════════════════════════════════════════════
const FB = FIREBASE_URL + FIREBASE_PATH;

function setSyncStatus(msg, color) {
  const el = document.getElementById('syncStatus');
  if (el) { el.textContent = msg; el.style.color = color || '#8090b8'; }
}

// Grava estado no Firebase (PUT substitui o nó inteiro)
async function pushStateToFirebase() {
  setSyncStatus('Salvando…', '#f39c12');
  try {
    const r = await fetch(FB, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(loadLS()),
    });
    if (r.ok) {
      setSyncStatus('✓ Sincronizado', '#27ae60');
      setTimeout(() => setSyncStatus('', ''), 3000);
    } else {
      setSyncStatus('⚠ Erro ao salvar', '#e74c3c');
    }
  } catch {
    setSyncStatus('⚠ Sem conexão', '#e74c3c');
  }
}

// Debounce 2s após última mudança do usuário
function schedulePush() {
  if (_fromRemote) return;
  clearTimeout(pushTimer);
  setSyncStatus('Aguardando…', '#8090b8');
  pushTimer = setTimeout(pushStateToFirebase, 2000);
}

// SSE — Firebase empurra mudanças em <1s sem polling
function connectFirebase() {
  if (evtSource) { evtSource.close(); evtSource = null; }
  evtSource = new EventSource(FB);
  let firstPut = true;

  evtSource.addEventListener('put', e => {
    try {
      const payload = JSON.parse(e.data);
      if (!payload || !payload.data) return;
      if (firstPut) { firstPut = false; return; } // ignora carga inicial
      const tag = document.activeElement?.tagName || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      _fromRemote = true;
      saveLS(payload.data);
      _fromRemote = false;
      refresh();
      setSyncStatus('↻ Atualizado por outro usuário', '#3498db');
      setTimeout(() => setSyncStatus('', ''), 4000);
    } catch {}
  });

  evtSource.onerror = () => setSyncStatus('⚠ Reconectando…', '#f39c12');
}

// Carrega estado inicial e conecta SSE
async function initStateFromFirebase() {
  try {
    const r = await fetch(FB, { cache: 'no-store' });
    if (r.ok) {
      const state = await r.json();
      if (state && typeof state === 'object') {
        _fromRemote = true;
        saveLS(state);
        _fromRemote = false;
      }
    }
  } catch {}
  connectFirebase();
  setSyncStatus('● Online', '#27ae60');
  setTimeout(() => setSyncStatus('', ''), 3000);
}

function csvUrl(scId) {
  return `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${BASE_CSV}_${scId}.csv?t=${Date.now()}`;
}

// ═══════════════════════════════════════════════════════════
// SELECT STYLE
// ═══════════════════════════════════════════════════════════
function applyStatusStyle(sel) {
  const st = STATUS_STYLE[sel.value] || STATUS_STYLE[''];
  sel.style.background = st.bg;
  sel.style.color      = st.fg;
  sel.style.borderColor = st.bg === '#f5f5f5' ? '#dde' : st.fg + '55';
}

// ═══════════════════════════════════════════════════════════
// OVERVIEW CARDS
// ═══════════════════════════════════════════════════════════
function renderCards() {
  const state = loadLS();
  const td    = today();

  const typeData = TABLES_DEF.map(t => {
    const plan  = t.origins.reduce((s, o) => s + (getRow(state, t.key, o).p || 0), 0);
    const exped = t.origins.reduce((s, o) => s + countExpedidas(t, o, td), 0);
    const pend  = Math.max(0, plan - exped);
    const pct   = plan > 0 ? Math.min(100, Math.round((exped / plan) * 100)) : 0;
    return { key: t.key, label: t.label, subtitle: t.subtitle, accent: t.accent, plan, exped, pend, pct };
  });

  const totalPlan  = typeData.reduce((s, t) => s + t.plan,  0);
  const totalExped = typeData.reduce((s, t) => s + t.exped, 0);
  const totalPend  = typeData.reduce((s, t) => s + t.pend,  0);
  const totalPct   = totalPlan > 0 ? Math.min(100, Math.round((totalExped / totalPlan) * 100)) : 0;

  const geral = {
    key: 'GERAL', label: 'GERAL', subtitle: 'Visão Geral', accent: '#293358',
    plan: totalPlan, exped: totalExped, pend: totalPend, pct: totalPct
  };

  const cards = [geral, ...typeData];
  document.getElementById('overviewCards').innerHTML = cards.map(c => `
    <div class="overview-card">
      <div class="card-header" style="background:${c.accent}18; border-left: 4px solid ${c.accent};">
        <span class="card-badge" style="background:${c.accent}">${c.label}</span>
        <span class="card-title">${c.subtitle}</span>
      </div>
      <div class="card-body">
        <div class="card-metric">
          <span class="mlabel">Planejadas</span>
          <span class="mvalue" style="color:#293358">${c.plan}</span>
        </div>
        <div class="card-metric">
          <span class="mlabel">Expedidas</span>
          <span class="mvalue" style="color:#27ae60">${c.exped}</span>
        </div>
        <div class="card-metric">
          <span class="mlabel">Pendentes</span>
          <span class="mvalue" style="color:${c.pend > 0 ? '#c0392b' : '#27ae60'}">${c.pend}</span>
        </div>
        <div class="prog-wrap">
          <div class="prog-bar"><div class="prog-fill" style="width:${c.pct}%"></div></div>
          <div class="prog-label">${c.pct}% expedido</div>
        </div>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════
// COUNT
// ═══════════════════════════════════════════════════════════
function countExpedidas(tDef, origin, td) {
  if (!allRows.length) return 0;
  return tDef.countFn(allRows, origin, COLS, td);
}

// ═══════════════════════════════════════════════════════════
// RENDER TABLES
// ═══════════════════════════════════════════════════════════
function renderAllTables() {
  const container = document.getElementById('tables');
  container.innerHTML = '';
  TABLES_DEF.forEach(tDef => container.appendChild(buildTableSection(tDef)));
}

function buildTableSection(tDef) {
  const state = loadLS();
  const td    = today();

  // compute rows
  const rows = tDef.origins.map(origin => {
    const saved = getRow(state, tDef.key, origin);
    const plan  = saved.p || 0;
    const exped = countExpedidas(tDef, origin, td);
    const pend  = plan > 0 ? plan - exped : null;
    return { origin, plan, exped, pend, status: saved.s || '', obs: saved.o || '' };
  });

  const sumPlan  = rows.reduce((s, r) => s + r.plan,  0);
  const sumExped = rows.reduce((s, r) => s + r.exped, 0);
  const sumPend  = rows.reduce((s, r) => s + (r.pend ?? 0), 0);

  const section = document.createElement('div');
  section.className = 'tbl-section';
  section.style.setProperty('--accent', tDef.accent);

  // Header
  section.innerHTML = `
    <div class="tbl-header" style="border-left-color:${tDef.accent}">
      <span class="type-badge" style="background:${tDef.accent}">${tDef.label}</span>
      <div>
        <h3>${tDef.subtitle}</h3>
      </div>
      <div class="totals">
        <div class="tot-item"><div class="tl">Planejadas</div><div class="tv plan">${sumPlan}</div></div>
        <div class="tot-item"><div class="tl">Expedidas</div><div class="tv exped">${sumExped}</div></div>
        <div class="tot-item"><div class="tl">Pendentes</div><div class="tv pend">${sumPend}</div></div>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>ID ORIGEM</th>
            <th>ORIGEM</th>
            <th>ROTAS PLANEJADAS</th>
            <th>ROTAS EXPEDIDAS</th>
            <th>ROTAS PENDENTES</th>
            <th>STATUS</th>
            <th style="min-width:160px">OBSERVAÇÃO</th>
          </tr>
        </thead>
        <tbody id="tbody-${tDef.key}"></tbody>
        <tfoot>
          <tr>
            <td colspan="2">TOTAL</td>
            <td id="ft-plan-${tDef.key}">${sumPlan}</td>
            <td id="ft-exped-${tDef.key}">${sumExped}</td>
            <td id="ft-pend-${tDef.key}">${sumPend}</td>
            <td colspan="2"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  `;


  // Build tbody
  const tbody = section.querySelector(`#tbody-${tDef.key}`);
  rows.forEach(row => {
    const tr = document.createElement('tr');

    // pend cell
    let pendHtml = '<span class="pend-na">—</span>';
    if (row.pend !== null) {
      const cls = row.pend > 0 ? 'pend-pos' : row.pend < 0 ? 'pend-neg' : 'pend-zero';
      pendHtml  = `<span class="${cls}">${row.pend}</span>`;
    }

    tr.innerHTML = `
      <td><span class="id-badge" style="background:${tDef.accent}">${tDef.key}</span></td>
      <td>${row.origin}</td>
      <td><input class="plan-input" type="number" min="0" value="${row.plan || ''}" placeholder="0" data-key="${tDef.key}" data-origin="${row.origin}" /></td>
      <td>${row.exped}</td>
      <td>${pendHtml}</td>
      <td>
        <select class="status-sel" data-key="${tDef.key}" data-origin="${row.origin}">
          ${STATUS_OPTS.map(o => `<option value="${o}"${o === row.status ? ' selected' : ''}>${o || '— status —'}</option>`).join('')}
        </select>
      </td>
      <td><input class="obs-input" type="text" maxlength="120" value="${esc(row.obs)}" placeholder="Observação..." data-key="${tDef.key}" data-origin="${row.origin}" /></td>
    `;

    // style select
    const sel = tr.querySelector('.status-sel');
    applyStatusStyle(sel);

    // events
    tr.querySelector('.plan-input').addEventListener('change', e => {
      const val = Math.max(0, parseInt(e.target.value) || 0);
      e.target.value = val || '';
      const st = loadLS();
      getRow(st, e.target.dataset.key, e.target.dataset.origin).p = val;
      saveLS(st);
      refresh();
    });

    sel.addEventListener('change', e => {
      applyStatusStyle(e.target);
      const st = loadLS();
      getRow(st, e.target.dataset.key, e.target.dataset.origin).s = e.target.value;
      saveLS(st);
    });

    tr.querySelector('.obs-input').addEventListener('change', e => {
      const st = loadLS();
      getRow(st, e.target.dataset.key, e.target.dataset.origin).o = e.target.value;
      saveLS(st);
    });

    tbody.appendChild(tr);
  });

  return section;
}

function esc(str) {
  return String(str || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ═══════════════════════════════════════════════════════════
// REFRESH (re-renders tables + chart)
// ═══════════════════════════════════════════════════════════
function refresh() {
  renderAllTables();
  renderCards();
}

// ═══════════════════════════════════════════════════════════
// CSV IMPORT GLOBAL (planejadas — vale para todos os gráficos)
// ═══════════════════════════════════════════════════════════
// Monta um mapa global origin → tabela para lookup rápido
function buildOriginMap() {
  const map = {};
  TABLES_DEF.forEach(t => t.origins.forEach(o => { map[o] = t.key; }));
  return map;
}

document.getElementById('btnImportGlobal').addEventListener('click', () => {
  document.getElementById('csvFileInput').value = '';
  document.getElementById('csvFileInput').click();
});

document.getElementById('btnClearAll').addEventListener('click', () => {
  const st = loadLS();
  TABLES_DEF.forEach(t => {
    t.origins.forEach(o => { if (st[t.key]?.[o]) st[t.key][o].p = 0; });
  });
  saveLS(st);
  refresh();
});

document.getElementById('csvFileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const originMap = buildOriginMap();

  Papa.parse(file, {
    header: true, skipEmptyLines: true,
    delimiter: '', // auto-detect ; ou ,
    complete(result) {
      const st   = loadLS();
      const rows = result.data;
      if (!rows.length) { alert('CSV vazio ou sem linhas válidas.'); return; }

      const fields      = result.meta.fields || [];
      const originField = fields[0];
      const planField   = fields.find(f => f.toUpperCase().includes('PLAN')) || fields[1];

      let imported = 0;
      rows.forEach(row => {
        const origin = String(row[originField] || '').trim();
        const plan   = Math.max(0, parseInt(row[planField]) || 0);
        const key    = originMap[origin];
        if (key) {
          getRow(st, key, origin).p = plan;
          imported++;
        }
      });
      saveLS(st);
      refresh();
      alert(`Importado: ${imported} origem(ns) atualizada(s) em todos os gráficos tabela.`);
    },
    error() { alert('Erro ao ler o CSV. Verifique o formato (ORIGEM ; PLANEJADAS).'); }
  });
});

// ═══════════════════════════════════════════════════════════
// LOAD DATA FROM GITHUB
// ═══════════════════════════════════════════════════════════
function loadData() {
  const scId = document.getElementById('scSelect').value;
  document.getElementById('statusMsg').innerHTML = '<span class="spinner"></span> Carregando ' + scId + '...';
  document.getElementById('statusMsg').style.display = '';

  Papa.parse(csvUrl(scId), {
    download: true, header: true, delimiter: ';', skipEmptyLines: true,
    complete(result) {
      if (!result.data || result.data.length === 0) {
        document.getElementById('statusMsg').innerHTML = '⚠️ Nenhum dado encontrado para ' + scId + '. Verifique se o arquivo existe no repositório.';
        return;
      }
      allRows = result.data;
      COLS    = detectCols(result.meta.fields || Object.keys(allRows[0]));

      document.getElementById('dashboard').style.display = '';
      document.getElementById('statusMsg').style.display = 'none';
      document.getElementById('lastUpdate').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');

      refresh();
    },
    error(err) {
      document.getElementById('statusMsg').innerHTML = '❌ Erro ao carregar: ' + err.message;
    }
  });
}

// ═══════════════════════════════════════════════════════════
// REFRESH SCHEDULER
// ═══════════════════════════════════════════════════════════
function scheduleRefresh() {
  clearInterval(refreshTimer);
  if (document.getElementById('autoRefresh').checked) {
    const secs = parseInt(document.getElementById('refreshInterval').value, 10);
    refreshTimer = setInterval(loadData, secs * 1000);
  }
}

// ═══════════════════════════════════════════════════════════
// REPORT
// ═══════════════════════════════════════════════════════════
function buildReport() {
  const state  = loadLS();
  const td     = today();
  const now    = new Date();
  const dataHora = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const lines = [];
  lines.push(`📊 *LOGISTICS MONITORING | SPA1 SPA2*`);
  lines.push(`📅 ${dataHora}`);

  TABLES_DEF.forEach(tDef => {
    const section = [];
    tDef.origins.forEach(origin => {
      const saved  = getRow(state, tDef.key, origin);
      const plan   = saved.p || 0;
      const exped  = countExpedidas(tDef, origin, td);
      const pend   = plan > 0 ? plan - exped : null;
      const status = saved.s || '';

      if (pend === 0 || status === 'SEM ATIVIDADE') {
        const pendStr   = pend !== null ? String(pend) : '—';
        const statusStr = status || '—';
        section.push(`• ${origin} | Pendentes: ${pendStr} | ${statusStr}`);
      }
    });

    if (section.length > 0) {
      lines.push('');
      lines.push(`*${tDef.label} — ${tDef.subtitle}*`);
      section.forEach(l => lines.push(l));
    }
  });

  if (lines.length === 2) {
    lines.push('');
    lines.push('Nenhuma rota com Pendentes = 0 ou Status = SEM ATIVIDADE.');
  }

  return lines.join('\n');
}

function openReport() {
  const overlay = document.getElementById('reportOverlay');
  document.getElementById('reportText').value = buildReport();
  overlay.style.display = 'flex';
}

function closeReport() {
  document.getElementById('reportOverlay').style.display = 'none';
}

document.getElementById('btnReport').addEventListener('click', openReport);
document.getElementById('btnCloseReport').addEventListener('click', closeReport);
document.getElementById('btnCloseReport2').addEventListener('click', closeReport);
document.getElementById('reportOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeReport(); });

document.getElementById('btnCopyReport').addEventListener('click', () => {
  const txt = document.getElementById('reportText');
  txt.select();
  txt.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(txt.value).then(() => {
    const btn = document.getElementById('btnCopyReport');
    btn.textContent = '✓ Copiado!';
    setTimeout(() => { btn.innerHTML = '&#128203; Copiar'; }, 2000);
  });
});

// ═══════════════════════════════════════════════════════════
// EVENTS + INIT
// ═══════════════════════════════════════════════════════════
document.getElementById('btnLoad').addEventListener('click', loadData);
document.getElementById('autoRefresh').addEventListener('change', scheduleRefresh);
document.getElementById('refreshInterval').addEventListener('change', scheduleRefresh);

loadData();
scheduleRefresh();
initStateFromFirebase().then(() => refresh()); // carrega estado compartilhado e abre SSE
</script>
