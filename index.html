<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Monitoramento Logístico</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --verde:   #acdb26;
      --azul:    #293358;
      --fundo:   #f0f3e4;
      --amarelo: #FFE600;
      --cinza:   #e1e4d1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--fundo); color: var(--azul); }

    /* ── HEADER ── */
    .header-bar {
      background: var(--amarelo);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-bar h1 { font-size: 1.25rem; font-weight: 700; color: var(--azul); letter-spacing: .5px; }
    .badge {
      background: var(--azul); color: white;
      font-size: .7rem; font-weight: 700; padding: 3px 8px; border-radius: 20px;
    }

    /* ── NAV ── */
    .nav-bar {
      background: #1e2845; display: flex; align-items: center; padding: 0 24px;
    }
    .nav-bar a {
      display: inline-block; padding: 10px 20px; color: #8090b8;
      text-decoration: none; font-size: .88rem; font-weight: 600;
      border-bottom: 3px solid transparent; transition: all .15s;
    }
    .nav-bar a:hover { color: #cdd4f0; }
    .nav-bar a.active { color: var(--amarelo); border-bottom-color: var(--amarelo); }

    /* ── TOOLBAR ── */
    .toolbar {
      background: var(--azul); padding: 12px 24px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .toolbar label { color: #cdd4f0; font-size: .85rem; }
    .toolbar select, .toolbar input {
      border: none; border-radius: 6px; padding: 6px 10px; font-size: .9rem;
      background: white; color: var(--azul); outline: none;
    }
    .toolbar button {
      background: var(--verde); color: var(--azul); border: none;
      border-radius: 6px; padding: 7px 16px; font-weight: 700; cursor: pointer; font-size: .9rem;
      transition: opacity .15s;
    }
    .toolbar button:hover { opacity: .85; }
    .toolbar button.sec {
      background: transparent; border: 1px solid #8090b8; color: #cdd4f0;
    }
    .last-update { margin-left: auto; color: #8090b8; font-size: .78rem; }

    /* ── MAIN ── */
    main { padding: 20px 24px; }

    /* ── CARDS ── */
    .cards { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
    .card {
      flex: 1 1 160px; min-width: 140px;
      background: white; border-radius: 10px; padding: 16px 18px;
      box-shadow: 0 3px 10px rgba(0,0,0,.08);
      border-left: 4px solid var(--verde);
    }
    .card .label { font-size: .72rem; font-weight: 600; text-transform: uppercase; color: #6b7a9a; margin-bottom: 6px; }
    .card .value { font-size: 1.7rem; font-weight: 700; color: var(--azul); }
    .card .sub   { font-size: .78rem; color: #8090b8; margin-top: 2px; }
    .card.warn { border-left-color: #f39c12; }
    .card.danger { border-left-color: #e74c3c; }
    .card.ok { border-left-color: var(--verde); }

    /* ── CHARTS ── */
    .charts { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .chart-box {
      flex: 1 1 280px;
      background: white; border-radius: 10px; padding: 16px;
      box-shadow: 0 3px 10px rgba(0,0,0,.08);
    }
    .chart-box h3 { font-size: .85rem; color: #6b7a9a; text-transform: uppercase; margin-bottom: 10px; }
    .chart-box canvas { max-height: 220px; }

    /* ── TABLE ── */
    .table-wrap {
      background: white; border-radius: 10px; overflow: hidden;
      box-shadow: 0 3px 10px rgba(0,0,0,.08);
    }
    .table-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid #eee;
    }
    .table-header h2 { font-size: .95rem; font-weight: 700; color: var(--azul); }
    #searchInput {
      border: 1px solid #dde; border-radius: 6px; padding: 6px 12px;
      font-size: .85rem; width: 220px; outline: none;
    }
    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    thead th {
      background: var(--azul); color: white; padding: 10px 12px;
      text-align: left; white-space: nowrap; cursor: pointer; user-select: none;
      position: sticky; top: 0;
    }
    thead th:hover { background: #3e4b7a; }
    thead th.sorted-asc::after  { content: ' ▲'; font-size: .65rem; }
    thead th.sorted-desc::after { content: ' ▼'; font-size: .65rem; }
    tbody tr:nth-child(even) { background: #f8f9f4; }
    tbody tr:hover { background: #eef3d6; }
    tbody td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
    .pagination {
      display: flex; align-items: center; justify-content: flex-end; gap: 8px;
      padding: 12px 18px; font-size: .82rem; color: #6b7a9a;
    }
    .pagination button {
      border: 1px solid #dde; background: white; color: var(--azul);
      border-radius: 5px; padding: 4px 10px; cursor: pointer; font-size: .82rem;
    }
    .pagination button:disabled { opacity: .4; cursor: default; }

    /* ── STATUS ── */
    #statusMsg {
      text-align: center; padding: 40px; color: #8090b8; font-size: .95rem;
    }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 3px solid #cdd; border-top-color: var(--azul);
      border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header-bar">
  <h1>MONITORAMENTO LOGÍSTICO</h1>
  <span class="badge">Mercado Envios</span>
</div>

<!-- NAV -->
<div class="nav-bar">
  <a href="index.html" class="active">&#9632; Principal</a>
  <a href="carriers.html">&#9651; Transportadoras</a>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <label>Service Center:</label>
  <select id="scSelect">
    <option value="SPA1_SPA2">SPA1 + SPA2 (consolidado)</option>
    <option value="SPA1">SPA1</option>
    <option value="SPA2">SPA2</option>
    <option value="SAL1">SAL1</option>
    <option value="SAM1">SAM1</option>
    <option value="SBA2">SBA2</option>
    <option value="SBA3">SBA3</option>
    <option value="SBA4">SBA4</option>
    <option value="SBA7">SBA7</option>
    <option value="SCE1">SCE1</option>
    <option value="SDF1">SDF1</option>
    <option value="SDF2">SDF2</option>
    <option value="SGO1">SGO1</option>
    <option value="SGO2">SGO2</option>
    <option value="SJP1">SJP1</option>
    <option value="SMN1">SMN1</option>
    <option value="SMR1">SMR1</option>
    <option value="SMR2">SMR2</option>
    <option value="SMS1">SMS1</option>
    <option value="SMS2">SMS2</option>
    <option value="SPE1">SPE1</option>
    <option value="SPI1">SPI1</option>
    <option value="SRD1">SRD1</option>
    <option value="SRD2">SRD2</option>
    <option value="SRN1">SRN1</option>
    <option value="SSE1">SSE1</option>
    <option value="STO1">STO1</option>
    <option value="STO2">STO2</option>
  </select>

  <button id="btnLoad">&#8635; Atualizar</button>

  <label style="margin-left:8px;">
    <input type="checkbox" id="autoRefresh" checked /> Auto-refresh
  </label>
  <select id="refreshInterval" style="width:auto;">
    <option value="60">1 min</option>
    <option value="120" selected>2 min</option>
    <option value="300">5 min</option>
  </select>

  <span class="last-update" id="lastUpdate">—</span>
</div>

<!-- MAIN -->
<main>
  <div id="statusMsg"><span class="spinner"></span> Carregando dados...</div>

  <div id="dashboard" style="display:none;">
    <!-- CARDS -->
    <div class="cards" id="cards"></div>

    <!-- CHARTS -->
    <div class="charts" id="chartsRow">
      <div class="chart-box">
        <h3>Rotas por Checkpoint</h3>
        <canvas id="chartCheckpoint"></canvas>
      </div>
      <div class="chart-box">
        <h3>Distribuição por SC</h3>
        <canvas id="chartSC"></canvas>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-header">
        <h2 id="tableTitle">Rotas</h2>
        <input id="searchInput" type="text" placeholder="Buscar..." oninput="applyFilter()" />
      </div>
      <div class="table-container">
        <table id="mainTable">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="pagination">
        <span id="pageInfo"></span>
        <button id="btnPrev" onclick="changePage(-1)">&#8592; Anterior</button>
        <button id="btnNext" onclick="changePage(1)">Próxima &#8594;</button>
      </div>
    </div>
  </div>
</main>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const OWNER  = 'Franmoraes01';
const REPO   = 'utr-otr-dashboard';
const BRANCH = 'main';
const BASE   = 'Logistics_api';

function csvUrl(scId) {
  const file = `${BASE}_${scId}.csv`;
  return `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${file}?t=${Date.now()}`;
}

// ── STATE ─────────────────────────────────────────────────────
let allRows     = [];
let filteredRows = [];
let columns     = [];
let sortCol     = -1;
let sortAsc     = true;
let currentPage = 1;
const PAGE_SIZE = 50;

let chartCheckpoint = null;
let chartSC         = null;
let refreshTimer    = null;

// ── CARDS CONFIG ──────────────────────────────────────────────
// Tentamos detectar colunas relevantes dinamicamente
const CARD_DEFS = [
  { label: 'Total Rotas',       fn: rows => rows.length,                            cls: '' },
  { label: 'Ativas',            fn: rows => countCheckpoint(rows, 'active'),         cls: 'ok' },
  { label: 'Fechadas',          fn: rows => countCheckpoint(rows, 'close'),          cls: '' },
  { label: 'No Destino',        fn: rows => countCheckpoint(rows, 'at_destination'), cls: 'warn' },
  { label: 'Retorno',           fn: rows => countCheckpoint(rows, 'return'),         cls: 'danger' },
];

function colFind(row, fragments) {
  const k = Object.keys(row).find(c =>
    fragments.every(f => c.toLowerCase().includes(f.toLowerCase()))
  );
  return k ? row[k] : undefined;
}

function countCheckpoint(rows, keyword) {
  // busca em qualquer coluna que contenha "checkpoint" ou "status"
  return rows.filter(r => {
    const val = colFind(r, ['checkpoint']) || colFind(r, ['status']) || '';
    return String(val).toLowerCase().includes(keyword);
  }).length;
}

// ── LOAD ──────────────────────────────────────────────────────
async function loadData() {
  const scId = document.getElementById('scSelect').value;
  setStatus('<span class="spinner"></span> Carregando ' + scId + '...');

  Papa.parse(csvUrl(scId), {
    download: true,
    header: true,
    delimiter: ';',
    skipEmptyLines: true,
    complete(result) {
      if (!result.data || result.data.length === 0) {
        setStatus('⚠️ Nenhum dado encontrado para ' + scId + '. O arquivo pode ainda não ter sido enviado.');
        return;
      }
      allRows  = result.data;
      columns  = result.meta.fields || Object.keys(allRows[0]);
      applyFilter();
      renderCards();
      renderCharts();
      document.getElementById('dashboard').style.display = '';
      document.getElementById('statusMsg').style.display = 'none';
      document.getElementById('lastUpdate').textContent =
        'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
    },
    error(err) {
      setStatus('❌ Erro ao carregar dados: ' + err.message + '<br><small>Verifique se o GitHub Pages está ativo e o arquivo existe no repositório.</small>');
    }
  });
}

// ── CARDS ─────────────────────────────────────────────────────
function renderCards() {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  CARD_DEFS.forEach(def => {
    const val = def.fn(allRows);
    const pct = allRows.length > 0 ? ((val / allRows.length) * 100).toFixed(1) : '—';
    const div = document.createElement('div');
    div.className = 'card ' + def.cls;
    div.innerHTML = `<div class="label">${def.label}</div>
                     <div class="value">${val.toLocaleString('pt-BR')}</div>
                     <div class="sub">${def.label !== 'Total Rotas' ? pct + '% do total' : ''}</div>`;
    container.appendChild(div);
  });
}

// ── CHARTS ────────────────────────────────────────────────────
function renderCharts() {
  const CORES = ['#acdb26','#293358','#FFE600','#f39c12','#e74c3c','#3498db','#9b59b6','#1abc9c'];

  // Chart 1: por checkpoint
  const cpCol = columns.find(c => c.toLowerCase().includes('checkpoint')) || '';
  const cpMap = {};
  allRows.forEach(r => {
    const v = (r[cpCol] || 'desconhecido').toLowerCase();
    cpMap[v] = (cpMap[v] || 0) + 1;
  });
  const cpLabels = Object.keys(cpMap);
  const cpData   = cpLabels.map(k => cpMap[k]);

  if (chartCheckpoint) chartCheckpoint.destroy();
  chartCheckpoint = new Chart(document.getElementById('chartCheckpoint'), {
    type: 'doughnut',
    data: { labels: cpLabels, datasets: [{ data: cpData, backgroundColor: CORES, borderWidth: 2 }] },
    options: { plugins: { legend: { position: 'right', labels: { font: { size: 11 } } } }, cutout: '60%' }
  });

  // Chart 2: por SC (se houver coluna serviceCenterId)
  const scCol = columns.find(c => c.toLowerCase().includes('servicecenterid') || c.toLowerCase() === 'sc') || '';
  const scMap = {};
  allRows.forEach(r => {
    const v = r[scCol] || 'N/A';
    scMap[v] = (scMap[v] || 0) + 1;
  });
  const scLabels = Object.keys(scMap);
  const scData   = scLabels.map(k => scMap[k]);

  if (chartSC) chartSC.destroy();
  if (scLabels.length > 1) {
    chartSC = new Chart(document.getElementById('chartSC'), {
      type: 'bar',
      data: {
        labels: scLabels,
        datasets: [{ label: 'Rotas', data: scData, backgroundColor: '#293358', borderRadius: 5 }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true } }
      }
    });
    document.getElementById('chartsRow').style.display = '';
  } else {
    document.getElementById('chartsRow').style.display = 'none';
  }
}

// ── TABLE ─────────────────────────────────────────────────────
function applyFilter() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  filteredRows = q
    ? allRows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)))
    : [...allRows];
  sortRows();
  currentPage = 1;
  renderTable();
}

function sortRows() {
  if (sortCol < 0) return;
  const key = columns[sortCol];
  filteredRows.sort((a, b) => {
    const va = a[key] ?? '', vb = b[key] ?? '';
    const na = parseFloat(va), nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb)) return sortAsc ? na - nb : nb - na;
    return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });
}

function renderTable() {
  // Limita colunas exibidas: máx 20, priorizando as mais informativas
  const MAX_COLS = 20;
  const displayCols = columns.slice(0, MAX_COLS);

  // Thead
  const thead = document.getElementById('thead');
  thead.innerHTML = '<tr>' + displayCols.map((c, i) => {
    const cls = i === sortCol ? (sortAsc ? 'sorted-asc' : 'sorted-desc') : '';
    return `<th class="${cls}" onclick="setSort(${i})">${c}</th>`;
  }).join('') + '</tr>';

  // Tbody
  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filteredRows.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = slice.map(row =>
    '<tr>' + displayCols.map(c => `<td>${row[c] ?? ''}</td>`).join('') + '</tr>'
  ).join('');

  // Pagination
  const total = filteredRows.length;
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  document.getElementById('pageInfo').textContent =
    `${total.toLocaleString('pt-BR')} rotas — página ${currentPage} / ${pages}`;
  document.getElementById('btnPrev').disabled = currentPage <= 1;
  document.getElementById('btnNext').disabled = currentPage >= pages;
  document.getElementById('tableTitle').textContent =
    `Rotas (${total.toLocaleString('pt-BR')} registros)`;
  if (columns.length > MAX_COLS) {
    document.getElementById('tableTitle').textContent +=
      ` — exibindo ${MAX_COLS} de ${columns.length} colunas`;
  }
}

function setSort(i) {
  if (sortCol === i) sortAsc = !sortAsc; else { sortCol = i; sortAsc = true; }
  sortRows(); renderTable();
}

function changePage(delta) {
  const pages = Math.ceil(filteredRows.length / PAGE_SIZE);
  currentPage = Math.max(1, Math.min(pages, currentPage + delta));
  renderTable();
}

// ── HELPERS ───────────────────────────────────────────────────
function setStatus(html) {
  const el = document.getElementById('statusMsg');
  el.innerHTML = html;
  el.style.display = '';
  document.getElementById('dashboard').style.display = 'none';
}

function scheduleRefresh() {
  clearInterval(refreshTimer);
  if (document.getElementById('autoRefresh').checked) {
    const secs = parseInt(document.getElementById('refreshInterval').value, 10);
    refreshTimer = setInterval(loadData, secs * 1000);
  }
}

// ── EVENTS ────────────────────────────────────────────────────
document.getElementById('btnLoad').addEventListener('click', loadData);
document.getElementById('scSelect').addEventListener('change', loadData);
document.getElementById('autoRefresh').addEventListener('change', scheduleRefresh);
document.getElementById('refreshInterval').addEventListener('change', scheduleRefresh);

// ── INIT ──────────────────────────────────────────────────────
loadData();
scheduleRefresh();
</script>
</body>
</html>
